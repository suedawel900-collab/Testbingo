<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ካርዶች ይምረጡ - ቢንጎ ጨዋታ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }

        body {
            background: #f0f0f0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border: 3px solid #333;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #333;
        }

        /* የቁጥር ግሪድ 1-100 */
        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 2px;
            background: #333;
            padding: 2px;
            margin-bottom: 30px;
        }

        .number-cell {
            background: white;
            padding: 8px 4px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid #999;
        }

        .number-cell.called {
            background: #90EE90;
            font-weight: bold;
        }

        /* የቢንጎ ካርድ */
        .bingo-card {
            border: 3px solid #333;
            margin: 30px 0;
            padding: 20px;
            background: white;
        }

        .bingo-title {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
            letter-spacing: 10px;
        }

        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px;
            background: #333;
            padding: 2px;
        }

        .bingo-header {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
            font-weight: bold;
            font-size: 24px;
        }

        .bingo-cell {
            background: white;
            text-align: center;
            padding: 20px 10px;
            font-size: 20px;
            font-weight: bold;
            border: 1px solid #999;
        }

        .free-cell {
            background: #FFD700;
            font-size: 28px;
        }

        /* የካርድ ቁጥሮች */
        .card-numbers {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
            padding: 20px;
            border: 2px solid #333;
            background: #f9f9f9;
        }

        .card-number-item {
            padding: 8px 15px;
            background: white;
            border: 2px solid #333;
            font-size: 16px;
            font-weight: bold;
            min-width: 50px;
            text-align: center;
        }

        /* የካርዶች ዝርዝር */
        .cards-list {
            margin: 30px 0;
            padding: 20px;
            border: 3px solid #333;
            background: #f9f9f9;
        }

        .cards-list h3 {
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: bold;
        }

        .cards-list ul {
            list-style: none;
        }

        .cards-list li {
            padding: 12px;
            margin: 8px 0;
            background: white;
            border: 2px solid #333;
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }

        /* Confirm/Cancel Buttons */
        .action-buttons {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 3px solid #333;
        }

        .btn {
            flex: 1;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
            border: 3px solid #333;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            background: #333;
            color: white;
        }

        .btn-confirm {
            background: #4CAF50;
            color: white;
        }

        .btn-cancel {
            background: #f44336;
            color: white;
        }

        .btn-confirm:hover {
            background: #45a049;
        }

        .btn-cancel:hover {
            background: #da190b;
        }

        /* ማስታወሻ */
        .note {
            margin-top: 20px;
            padding: 15px;
            background: #e0e0e0;
            border: 2px solid #333;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>የቢንጎ ካርድ ምርጫ</h1>

        <!-- የቁጥር ግሪድ 1-100 (እንደ ምስሉ) -->
        <div class="numbers-grid" id="numberGrid"></div>

        <!-- የቢንጎ ካርድ (እንደ ምስሉ) -->
        <div class="bingo-card">
            <div class="bingo-title">B I N G O</div>
            <div class="bingo-grid" id="bingoGrid"></div>
        </div>

        <!-- የካርድ ቁጥሮች (እንደ ምስሉ) -->
        <div class="card-numbers" id="cardNumbers"></div>

        <!-- የተመረጡ ካርዶች ዝርዝር (እንደ ምስሉ) -->
        <div class="cards-list">
            <h3>የተመረጡ ካርዶች ቁጥሮች:</h3>
            <ul id="selectedCardsList">
                <li>13   29   40   53   71</li>
                <li>5    25   34   51   68</li>
                <li>8    20    *   57   73</li>
                <li>7    21   37   60   72</li>
                <li>4    26   35   49   67</li>
            </ul>
        </div>

        <!-- Confirm/Cancel Buttons (እንደ ምስሉ) -->
        <div class="action-buttons">
            <button class="btn btn-confirm" onclick="confirmSelection()">Confirm</button>
            <button class="btn btn-cancel" onclick="cancelSelection()">Cancel</button>
        </div>

        <div class="note">
            * አረንጓዴ ቀለም ያላቸው ቁጥሮች የተጠሩ ቁጥሮች ናቸው
        </div>
    </div>

    <script>
        // የቁጥር ግሪድ 1-100 ማመንጨት
        function generateNumberGrid() {
            const grid = document.getElementById('numberGrid');
            
            for (let i = 1; i <= 100; i++) {
                const cell = document.createElement('div');
                cell.className = 'number-cell';
                cell.textContent = i;
                cell.id = `num-${i}`;
                grid.appendChild(cell);
            }
        }

        // የቢንጎ ካርድ ማመንጨት (እንደ ምስሉ)
        function generateBingoCard() {
            const grid = document.getElementById('bingoGrid');
            
            // B I N G O headers
            const headers = ['B', 'I', 'N', 'G', 'O'];
            headers.forEach(letter => {
                const header = document.createElement('div');
                header.className = 'bingo-header';
                header.textContent = letter;
                grid.appendChild(header);
            });

            // ከምስሉ የተወሰዱ ቁጥሮች
            const cardNumbers = [
                [13, 29, 40, 53, 71],
                [5, 25, 34, 51, 68],
                [8, 20, '*', 57, 73],
                [7, 21, 37, 60, 72],
                [4, 26, 35, 49, 67]
            ];

            // ቁጥሮቹን ማስገባት
            cardNumbers.forEach(row => {
                row.forEach(num => {
                    const cell = document.createElement('div');
                    cell.className = num === '*' ? 'bingo-cell free-cell' : 'bingo-cell';
                    cell.textContent = num;
                    grid.appendChild(cell);
                });
            });
        }

        // የካርድ ቁጥሮች ማሳየት (እንደ ምስሉ)
        function displayCardNumbers() {
            const container = document.getElementById('cardNumbers');
            const numbers = [13, 29, 40, 53, 71, 5, 25, 34, 51, 68, 8, 20, 57, 73, 7, 21, 37, 60, 72, 4, 26, 35, 49, 67];
            
            numbers.sort((a, b) => a - b);
            
            numbers.forEach(num => {
                const span = document.createElement('span');
                span.className = 'card-number-item';
                span.textContent = num;
                container.appendChild(span);
            });
        }

        // የተጠሩ ቁጥሮችን ማጉላት
        function highlightCalledNumbers() {
            const calledNumbers = [13, 29, 40, 53, 71, 5, 25, 34, 51, 68, 8, 20, 57, 73, 7, 21, 37, 60, 72, 4, 26, 35, 49, 67];
            
            calledNumbers.forEach(num => {
                const cell = document.getElementById(`num-${num}`);
                if (cell) {
                    cell.classList.add('called');
                }
            });
        }

        // Confirm function
        function confirmSelection() {
            const selectedCards = [
                [13, 29, 40, 53, 71],
                [5, 25, 34, 51, 68],
                [8, 20, '*', 57, 73],
                [7, 21, 37, 60, 72],
                [4, 26, 35, 49, 67]
            ];
            
            localStorage.setItem('selectedCards', JSON.stringify(selectedCards));
            
            // የክፍያ መረጃ ማስቀመጥ
            const totalCards = selectedCards.length;
            const pricePerCard = 10; // ከadmin የሚመጣ
            const totalPrice = totalCards * pricePerCard;
            
            localStorage.setItem('selectedCardCount', totalCards);
            localStorage.setItem('totalPrice', totalPrice);
            
            alert(`5 ካርዶች ተመርጠዋል!\nጠቅላላ ክፍያ: ${totalPrice} ብር`);
            
            // ወደ ክፍያ ገጽ መሄድ
            // window.location.href = 'payment.html';
        }

        // Cancel function
        function cancelSelection() {
            if (confirm('እርግጠኛ ነዎት መሰረዝ ይፈልጋሉ?')) {
                window.location.href = 'dashboard.html';
            }
        }

        // ሁሉንም አስጀምር
        generateNumberGrid();
        generateBingoCard();
        displayCardNumbers();
        highlightCalledNumbers();
    </script>
</body>
</html>
