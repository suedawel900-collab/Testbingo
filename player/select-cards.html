<!DOCTYPE html>
<html>
<head>
    <title>MK BINGO - ካርዶች ይምረጡ</title>
    <style>
        body {
            font-family: Arial;
            background: #bfaed1;
            text-align: center;
            padding: 20px;
        }

        h2 {
            color: #333;
            margin: 20px 0;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
            gap: 4px;
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .box {
            background: #e5d0c8;
            font-size: 12px;
            padding: 8px 4px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #b39e94;
        }

        .box:hover {
            background: #d4b5a8;
            transform: scale(1.1);
        }

        .selected {
            background: green;
            color: white;
            font-weight: bold;
        }

        #card-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
            margin: 20px auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        #card {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            justify-content: center;
            margin-top: 10px;
        }

        .cell {
            background: #e5b79f;
            padding: 15px 5px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            border: 1px solid #c48a6b;
        }

        .cell.free {
            background: #ffd700;
            color: #333;
        }

        .cell.called {
            background: #90EE90;
        }

        button {
            padding: 15px 50px;
            margin: 20px 0;
            font-size: 20px;
            border: none;
            border-radius: 8px;
            background: #355e12;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        button:hover {
            background: #23450c;
            transform: scale(1.05);
        }

        .selected-info {
            background: #e5d0c8;
            padding: 10px;
            border-radius: 8px;
            margin: 10px auto;
            max-width: 300px;
            font-weight: bold;
        }

        .card-header {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .header-cell {
            background: #8b6b5c;
            color: white;
            padding: 10px;
            border-radius: 8px;
        }

        .note {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h2>🎫 ካርድ ይምረጡ (1-1000)</h2>

    <!-- ከ1-1000 ቁጥሮች ግሪድ -->
    <div id="grid"></div>

    <!-- የተመረጠ ካርድ መረጃ -->
    <div id="selectedInfo" class="selected-info">ምንም ካርድ አልተመረጠም</div>

    <!-- የቢንጎ ካርድ 5x5 -->
    <div id="card-container">
        <h3>🎰 የተመረጠ ቢንጎ ካርድ</h3>
        <div class="card-header">
            <div class="header-cell">B</div>
            <div class="header-cell">I</div>
            <div class="header-cell">N</div>
            <div class="header-cell">G</div>
            <div class="header-cell">O</div>
        </div>
        <div id="card"></div>
    </div>

    <!-- Confirm ቁልፍ -->
    <button onclick="confirmCard()">✅ Confirm</button>
    <button onclick="cancelSelection()" style="background: #b22222;">❌ Cancel</button>

    <div class="note">
        * ከላይ ካሉት ቁጥሮች አንዱን መምረጥ ይችላሉ<br>
        * መካከለኛው ቦታ "FREE" ነው
    </div>

    <script>
        let selectedCard = null;
        let bingoCard = [];
        let calledNumbers = []; // የተጠሩ ቁጥሮች (ከጨዋታ የሚመጡ)

        let grid = document.getElementById("grid");
        let selectedInfo = document.getElementById("selectedInfo");

        // ==================== 1. ከ1-1000 ቁጥሮች ፍጠር ====================
        for (let i = 1; i <= 1000; i++) {
            let d = document.createElement("div");
            d.className = "box";
            d.innerText = i;
            
            // ቁጥር ሲጫን
            d.onclick = () => {
                // ከዚህ በፊት የተመረጠውን አስወግድ
                document.querySelectorAll(".box").forEach(b => b.classList.remove("selected"));
                
                // አዲሱን ምረጥ
                d.classList.add("selected");
                selectedCard = i;
                selectedInfo.innerText = `የተመረጠ ካርድ #${i}`;
                
                // ካርድ አሳይ
                showCard(i);
            };
            
            grid.appendChild(d);
        }

        // ==================== 2. የቢንጎ ካርድ ፍጠር ====================
        function generateCard(seed) {
            let nums = [];
            
            // በ seed (የካርድ ቁጥር) መሰረት የተለየ ካርድ ለማመንጨት
            let randomSeed = seed || Math.floor(Math.random() * 1000);
            
            // ለ B (1-15), I (16-30), N (31-45), G (46-60), O (61-75)
            for (let col = 0; col < 5; col++) {
                let min = col * 15 + 1;
                let max = (col + 1) * 15;
                
                // በእያንዳንዱ አምድ 5 የተለያዩ ቁጥሮች
                let colNumbers = [];
                while (colNumbers.length < 5) {
                    // በ seed እና በካርድ ቁጥር ላይ የተመሰረተ ቁጥር
                    let n = ((randomSeed * (col + 1) + colNumbers.length * 7) % (max - min + 1)) + min;
                    if (!colNumbers.includes(n)) {
                        colNumbers.push(n);
                    }
                }
                nums.push(...colNumbers);
            }
            
            // መካከለኛውን (12ኛውን) ነፃ አድርግ
            nums[12] = "*";
            
            return nums;
        }

        // ==================== 3. ካርድ አሳይ ====================
        function showCard(cardNumber) {
            // ካርድ ፍጠር (በ cardNumber መሰረት)
            bingoCard = generateCard(cardNumber);
            
            let c = document.getElementById("card");
            c.innerHTML = "";
            
            // 5x5 ግሪድ ፍጠር
            bingoCard.forEach((n, index) => {
                let d = document.createElement("div");
                d.className = "cell";
                
                // ነፃ ቦታ ከሆነ
                if (n === "*") {
                    d.classList.add("free");
                    d.innerText = "FREE";
                } 
                // ቁጥሩ ተጠርቶ ከሆነ
                else if (calledNumbers.includes(n)) {
                    d.classList.add("called");
                    d.innerText = n;
                }
                else {
                    d.innerText = n;
                }
                
                c.appendChild(d);
            });
        }

        // ==================== 4. ቁጥር መጥራት (ለሙከራ) ====================
        function callNumber() {
            let n = Math.floor(Math.random() * 75) + 1;
            if (!calledNumbers.includes(n)) {
                calledNumbers.push(n);
                // አሁን ያለውን ካርድ እንደገና አሳይ (ለማጉላት)
                if (selectedCard) {
                    showCard(selectedCard);
                }
                alert(`ቁጥር ${n} ተጠርቷል!`);
            }
        }

        // ==================== 5. Confirm ====================
        function confirmCard() {
            if (!selectedCard) {
                alert("እባክዎ መጀመሪያ ካርድ ይምረጡ!");
                return;
            }
            
            // የተመረጠውን ካርድ አስቀምጥ
            localStorage.setItem('selectedCard', selectedCard);
            localStorage.setItem('bingoCard', JSON.stringify(bingoCard));
            
            alert(`✅ ካርድ #${selectedCard} ተመርጧል!\nወደ ጨዋታ ይሂዱ።`);
            
            // ወደ ጨዋታ ገጽ መሄድ
            // window.location.href = 'game.html';
        }

        // ==================== 6. Cancel ====================
        function cancelSelection() {
            if (confirm("እርግጠኛ ነዎት መሰረዝ ይፈልጋሉ?")) {
                window.location.href = 'dashboard.html';
            }
        }

        // ==================== 7. ለሙከራ ቁጥሮች መጥራት ====================
        // ከታች ቁልፍ ጨምር
        let callBtn = document.createElement("button");
        callBtn.innerText = "🎲 ቁጥር ጥራ (ለሙከራ)";
        callBtn.style.background = "#8b6b5c";
        callBtn.style.margin = "10px";
        callBtn.onclick = callNumber;
        document.body.insertBefore(callBtn, document.querySelector('.note'));

        // ነባሪ ካርድ አሳይ (ለምሳሌ 900)
        setTimeout(() => {
            // ካርድ 900 ምረጥ
            let boxes = document.querySelectorAll(".box");
            if (boxes.length >= 900) {
                boxes[899].click(); // 900ኛውን ጠቅ አድርግ
            }
        }, 100);
    </script>
</body>
</html>
