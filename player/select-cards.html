<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ካርዶች ይምረጡ - ቢንጎ ጨዋታ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }

        body {
            background: #f0f0f0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border: 3px solid #333;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #333;
        }

        /* የካርድ ቁጥር መምረጫ */
        .card-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            align-items: center;
            background: #f9f9f9;
            padding: 20px;
            border: 3px solid #333;
        }

        .card-selector label {
            font-size: 20px;
            font-weight: bold;
        }

        .card-selector input {
            width: 150px;
            padding: 12px;
            font-size: 20px;
            border: 3px solid #333;
            text-align: center;
            font-weight: bold;
        }

        .card-selector button {
            padding: 12px 25px;
            font-size: 20px;
            font-weight: bold;
            background: #4169E1;
            color: white;
            border: 3px solid #333;
            cursor: pointer;
        }

        .card-selector button:hover {
            background: #1E3A8A;
        }

        /* የተመረጠ ካርድ መረጃ */
        .selected-info {
            background: #e0e0e0;
            padding: 15px;
            margin-bottom: 20px;
            border: 3px solid #333;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
        }

        /* የቢንጎ ካርድ 5x5 */
        .bingo-card-container {
            margin: 30px 0;
            border: 3px solid #333;
            padding: 30px;
            background: #f9f9f9;
        }

        .bingo-title {
            text-align: center;
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 30px;
            letter-spacing: 10px;
        }

        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 3px;
            background: #333;
            padding: 3px;
            max-width: 600px;
            margin: 0 auto;
        }

        .bingo-header {
            background: #333;
            color: white;
            text-align: center;
            padding: 20px;
            font-weight: bold;
            font-size: 28px;
        }

        .bingo-cell {
            background: white;
            text-align: center;
            padding: 25px 10px;
            font-size: 24px;
            font-weight: bold;
            border: 2px solid #999;
        }

        .free-cell {
            background: #FFD700;
        }

        .highlighted-cell {
            background: #90EE90;
            border: 3px solid #2E7D32;
        }

        /* የካርድ ቁጥሮች */
        .card-numbers {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 20px 0;
            padding: 20px;
            border: 3px solid #333;
            background: #f9f9f9;
        }

        .card-number-item {
            padding: 10px 15px;
            background: white;
            border: 2px solid #333;
            font-size: 18px;
            font-weight: bold;
            min-width: 50px;
            text-align: center;
            cursor: pointer;
        }

        .card-number-item:hover {
            background: #4169E1;
            color: white;
        }

        .card-number-item.selected {
            background: #4CAF50;
            color: white;
            border: 3px solid #2E7D32;
        }

        /* የተመረጡ ካርዶች ዝርዝር */
        .selected-cards-list {
            margin: 30px 0;
            padding: 20px;
            border: 3px solid #333;
            background: #f9f9f9;
        }

        .selected-cards-list h3 {
            font-size: 22px;
            margin-bottom: 15px;
        }

        .selected-cards-list ul {
            list-style: none;
        }

        .selected-cards-list li {
            padding: 12px;
            margin: 5px 0;
            background: white;
            border: 2px solid #333;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
        }

        .selected-cards-list li:hover {
            background: #e0e0e0;
        }

        .selected-cards-list li.active {
            background: #4169E1;
            color: white;
        }

        /* Confirm/Cancel Buttons */
        .action-buttons {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
            border: 3px solid #333;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-confirm {
            background: #4CAF50;
            color: white;
        }

        .btn-cancel {
            background: #f44336;
            color: white;
        }

        .btn:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>የቢንጎ ካርድ ምርጫ</h1>

        <!-- የካርድ ቁጥር መምረጫ -->
        <div class="card-selector">
            <label>የካርድ ቁጥር (1-1000):</label>
            <input type="number" id="cardNumberInput" min="1" max="1000" value="900">
            <button onclick="showSelectedCard()">ካርድ አሳይ</button>
        </div>

        <!-- የተመረጠ ካርድ መረጃ -->
        <div class="selected-info" id="selectedInfo">
            የተመረጠ ካርድ: 900
        </div>

        <!-- የቢንጎ ካርድ 5x5 -->
        <div class="bingo-card-container">
            <div class="bingo-title">B I N G O</div>
            <div class="bingo-grid" id="bingoGrid"></div>
        </div>

        <!-- የካርድ ቁጥሮች (24 ቁጥሮች) -->
        <div class="card-numbers" id="cardNumbers"></div>

        <!-- የተመረጡ ካርዶች ዝርዝር -->
        <div class="selected-cards-list">
            <h3>የተመረጡ ካርዶች (ጠቅ ያድርጉ ለማየት):</h3>
            <ul id="selectedCardsList">
                <li onclick="loadCard(1)">ካርድ 1: 13, 29, 40, 53, 71, ...</li>
                <li onclick="loadCard(2)">ካርድ 2: 5, 25, 34, 51, 68, ...</li>
                <li onclick="loadCard(3)">ካርድ 3: 8, 20, *, 57, 73, ...</li>
                <li onclick="loadCard(4)">ካርድ 4: 7, 21, 37, 60, 72, ...</li>
                <li onclick="loadCard(5)">ካርድ 5: 4, 26, 35, 49, 67, ...</li>
            </ul>
        </div>

        <!-- Confirm/Cancel Buttons -->
        <div class="action-buttons">
            <button class="btn btn-confirm" onclick="confirmSelection()">Confirm</button>
            <button class="btn btn-cancel" onclick="cancelSelection()">Cancel</button>
        </div>
    </div>

    <script>
        // ሁሉም ካርዶች (ለምሳሌ 1000 ካርዶች)
        let allCards = [];
        let currentCardNumber = 900;
        let selectedCards = [];

        // ==================== ካርዶችን ማመንጨት ====================
        function generateAllCards() {
            for (let cardNum = 1; cardNum <= 1000; cardNum++) {
                const card = generateSingleCard(cardNum);
                allCards.push(card);
            }
        }

        // ==================== አንድ ካርድ ማመንጨት ====================
        function generateSingleCard(cardNum) {
            const card = {
                id: cardNum,
                numbers: [],
                allNumbers: []
            };

            // የዘፈቀደ ቁጥሮች ማመንጨት ለካርዱ
            for (let row = 0; row < 5; row++) {
                const rowNumbers = [];
                for (let col = 0; col < 5; col++) {
                    if (row === 2 && col === 2) {
                        rowNumbers.push('*'); // ነፃ ቦታ
                        card.allNumbers.push('*');
                    } else {
                        // በካርዱ ቁጥር መሰረት የተለየ ቁጥር ማመንጨት
                        const min = col * 15 + 1;
                        const max = (col + 1) * 15;
                        const num = ((cardNum * 7 + row * 5 + col) % (max - min + 1)) + min;
                        rowNumbers.push(num);
                        card.allNumbers.push(num);
                    }
                }
                card.numbers.push(rowNumbers);
            }
            
            return card;
        }

        // ==================== ካርድ ማሳየት ====================
        function displayCard(cardNumber) {
            currentCardNumber = cardNumber;
            document.getElementById('selectedInfo').innerHTML = `የተመረጠ ካርድ: ${cardNumber}`;
            
            const card = allCards[cardNumber - 1];
            if (!card) return;
            
            const grid = document.getElementById('bingoGrid');
            grid.innerHTML = '';
            
            // B I N G O headers
            const headers = ['B', 'I', 'N', 'G', 'O'];
            headers.forEach(letter => {
                const header = document.createElement('div');
                header.className = 'bingo-header';
                header.textContent = letter;
                grid.appendChild(header);
            });

            // የካርድ ቁጥሮች
            card.numbers.forEach(row => {
                row.forEach(num => {
                    const cell = document.createElement('div');
                    if (num === '*') {
                        cell.className = 'bingo-cell free-cell';
                    } else {
                        cell.className = 'bingo-cell';
                    }
                    cell.textContent = num;
                    grid.appendChild(cell);
                });
            });

            // የካርድ ቁጥሮች ማሳየት
            displayCardNumbers(card.allNumbers);
        }

        // ==================== የካርድ ቁጥሮች ማሳየት ====================
        function displayCardNumbers(numbers) {
            const container = document.getElementById('cardNumbers');
            container.innerHTML = '';
            
            // ቁጥሮችን ደርድር
            const sortedNumbers = numbers.filter(n => n !== '*').sort((a, b) => a - b);
            
            sortedNumbers.forEach(num => {
                const span = document.createElement('span');
                span.className = 'card-number-item';
                span.textContent = num;
                span.onclick = () => toggleSelectNumber(num);
                container.appendChild(span);
            });
        }

        // ==================== ቁጥር መምረጥ ====================
        function toggleSelectNumber(num) {
            const card = allCards[currentCardNumber - 1];
            if (!card) return;
            
            // በካርዱ ላይ ቁጥሩን ማጉላት
            const cells = document.querySelectorAll('.bingo-cell');
            let index = 0;
            
            card.numbers.forEach((row, i) => {
                row.forEach((cellNum, j) => {
                    if (cellNum === num) {
                        const cellIndex = i * 5 + j + 5; // +5 ለ headers
                        if (cells[cellIndex]) {
                            cells[cellIndex].classList.toggle('highlighted-cell');
                        }
                    }
                    index++;
                });
            });
        }

        // ==================== ካርድ መምረጥ ====================
        function showSelectedCard() {
            const cardNum = parseInt(document.getElementById('cardNumberInput').value);
            if (cardNum >= 1 && cardNum <= 1000) {
                displayCard(cardNum);
                
                // ወደተመረጡ ካርዶች መጨመር
                if (!selectedCards.includes(cardNum)) {
                    selectedCards.push(cardNum);
                    updateSelectedCardsList();
                }
            } else {
                alert('እባክዎ ከ1 እስከ 1000 ቁጥር ይምረጡ');
            }
        }

        // ==================== የተመረጡ ካርዶች ዝርዝር ማዘመን ====================
        function updateSelectedCardsList() {
            const list = document.getElementById('selectedCardsList');
            list.innerHTML = '';
            
            selectedCards.forEach(cardNum => {
                const li = document.createElement('li');
                li.textContent = `ካርድ ${cardNum}`;
                li.onclick = () => displayCard(cardNum);
                li.className = cardNum === currentCardNumber ? 'active' : '';
                list.appendChild(li);
            });
        }

        // ==================== ካርድ መጫን (ከዝርዝር) ====================
        function loadCard(cardNum) {
            displayCard(cardNum);
            document.getElementById('cardNumberInput').value = cardNum;
        }

        // ==================== Confirm ====================
        function confirmSelection() {
            alert(`${selectedCards.length} ካርዶች ተመርጠዋል!\nጠቅላላ ክፍያ: ${selectedCards.length * 10} ብር`);
            localStorage.setItem('selectedCards', JSON.stringify(selectedCards));
        }

        // ==================== Cancel ====================
        function cancelSelection() {
            if (confirm('እርግጠኛ ነዎት መሰረዝ ይፈልጋሉ?')) {
                window.location.href = 'dashboard.html';
            }
        }

        // ==================== ጀምር ====================
        generateAllCards();
        displayCard(900); // ነባሪ 900 ካርድ አሳይ
        selectedCards.push(900);
        updateSelectedCardsList();
    </script>
</body>
</html>
