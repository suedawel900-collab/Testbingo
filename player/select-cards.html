<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ካርዶች ይምረጡ - ቢንጎ ጨዋታ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }

        body {
            background: #f0f0f0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border: 3px solid #333;
            padding: 20px;
        }

        /* የቁጥር ግሪድ 1-1000 */
        .numbers-section {
            margin-bottom: 30px;
        }

        .numbers-section h2 {
            font-size: 24px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 2px;
            background: #333;
            padding: 2px;
            border: 2px solid #333;
            max-height: 400px;
            overflow-y: auto;
        }

        .number-cell {
            background: white;
            padding: 5px 2px;
            text-align: center;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid #999;
        }

        .number-cell.called {
            background: #90EE90;
        }

        /* የቢንጎ ካርድ */
        .bingo-section {
            margin: 30px 0;
        }

        .bingo-section h2 {
            font-size: 24px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .bingo-card {
            border: 3px solid #333;
            padding: 20px;
            background: white;
        }

        .bingo-title {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
            letter-spacing: 10px;
        }

        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px;
            background: #333;
            padding: 2px;
        }

        .bingo-header {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
            font-weight: bold;
            font-size: 24px;
        }

        .bingo-cell {
            background: white;
            text-align: center;
            padding: 15px 10px;
            font-size: 20px;
            font-weight: bold;
            border: 1px solid #999;
        }

        .free-cell {
            background: #FFD700;
        }

        /* የካርድ ቁጥሮች */
        .card-numbers-section {
            margin: 30px 0;
        }

        .card-numbers-section h2 {
            font-size: 24px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .card-numbers {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 15px;
            border: 3px solid #333;
            background: #f9f9f9;
        }

        .card-number-item {
            padding: 8px 12px;
            background: white;
            border: 2px solid #333;
            font-size: 16px;
            font-weight: bold;
            min-width: 45px;
            text-align: center;
        }

        /* የተመረጡ ካርዶች */
        .selected-cards-section {
            margin: 30px 0;
        }

        .selected-cards-section h2 {
            font-size: 24px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .cards-list {
            border: 3px solid #333;
            padding: 20px;
            background: #f9f9f9;
        }

        .cards-list ul {
            list-style: none;
        }

        .cards-list li {
            padding: 12px;
            margin: 5px 0;
            background: white;
            border: 2px solid #333;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            font-family: monospace;
        }

        /* Confirm/Cancel Buttons */
        .action-buttons {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
            border: 3px solid #333;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-confirm {
            background: #4CAF50;
            color: white;
        }

        .btn-cancel {
            background: #f44336;
            color: white;
        }

        .btn:hover {
            opacity: 0.8;
        }

        /* ማስታወሻ */
        .note {
            margin-top: 20px;
            padding: 10px;
            background: #e0e0e0;
            border: 2px solid #333;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- የቁጥር ግሪድ 1-1000 -->
        <div class="numbers-section">
            <h2>ቁጥሮች 1-1000</h2>
            <div class="numbers-grid" id="numberGrid"></div>
        </div>

        <!-- የቢንጎ ካርድ -->
        <div class="bingo-section">
            <h2>የቢንጎ ካርድ</h2>
            <div class="bingo-card">
                <div class="bingo-title">B I N G O</div>
                <div class="bingo-grid" id="bingoGrid"></div>
            </div>
        </div>

        <!-- የካርድ ቁጥሮች -->
        <div class="card-numbers-section">
            <h2>የካርድ ቁጥሮች</h2>
            <div class="card-numbers" id="cardNumbers"></div>
        </div>

        <!-- የተመረጡ ካርዶች -->
        <div class="selected-cards-section">
            <h2>የተመረጡ ካርዶች</h2>
            <div class="cards-list">
                <ul id="selectedCardsList"></ul>
            </div>
        </div>

        <!-- Confirm/Cancel Buttons -->
        <div class="action-buttons">
            <button class="btn btn-confirm" onclick="confirmSelection()">Confirm</button>
            <button class="btn btn-cancel" onclick="cancelSelection()">Cancel</button>
        </div>

        <div class="note">
            * አረንጓዴ ቀለም ያላቸው ቁጥሮች የተጠሩ ቁጥሮች ናቸው
        </div>
    </div>

    <script>
        // ==================== 1. የቁጥር ግሪድ 1-1000 ማመንጨት ====================
        function generateNumberGrid() {
            const grid = document.getElementById('numberGrid');
            
            for (let i = 1; i <= 1000; i++) {
                const cell = document.createElement('div');
                cell.className = 'number-cell';
                cell.textContent = i;
                cell.id = `num-${i}`;
                grid.appendChild(cell);
            }
        }

        // ==================== 2. የቢንጎ ካርድ ማመንጨት ====================
        function generateBingoCard() {
            const grid = document.getElementById('bingoGrid');
            
            // B I N G O headers
            const headers = ['B', 'I', 'N', 'G', 'O'];
            headers.forEach(letter => {
                const header = document.createElement('div');
                header.className = 'bingo-header';
                header.textContent = letter;
                grid.appendChild(header);
            });

            // የቢንጎ ካርድ ቁጥሮች (እንደ ምስሉ)
            const cardNumbers = [
                [13, 29, 40, 53, 71],
                [5, 25, 34, 51, 68],
                [8, 20, '*', 57, 73],
                [7, 21, 37, 60, 72],
                [4, 26, 35, 49, 67]
            ];

            // ቁጥሮቹን ማስገባት
            cardNumbers.forEach(row => {
                row.forEach(num => {
                    const cell = document.createElement('div');
                    if (num === '*') {
                        cell.className = 'bingo-cell free-cell';
                    } else {
                        cell.className = 'bingo-cell';
                    }
                    cell.textContent = num;
                    grid.appendChild(cell);
                });
            });
        }

        // ==================== 3. የካርድ ቁጥሮች ማሳየት ====================
        function displayCardNumbers() {
            const container = document.getElementById('cardNumbers');
            
            // ከምስሉ የተወሰዱ ቁጥሮች (24 ቁጥሮች)
            const numbers = [
                13, 29, 40, 53, 71,
                5, 25, 34, 51, 68,
                8, 20, 57, 73,
                7, 21, 37, 60, 72,
                4, 26, 35, 49, 67
            ];
            
            // ቁጥሮችን ደርድር
            numbers.sort((a, b) => a - b);
            
            // እያንዳንዱን ቁጥር አሳይ
            numbers.forEach(num => {
                const span = document.createElement('span');
                span.className = 'card-number-item';
                span.textContent = num;
                container.appendChild(span);
            });
        }

        // ==================== 4. የተመረጡ ካርዶች ዝርዝር ====================
        function displaySelectedCards() {
            const list = document.getElementById('selectedCardsList');
            
            // ከምስሉ የተወሰዱ 5 ካርዶች
            const cards = [
                '13   29   40   53   71',
                '5    25   34   51   68',
                '8    20    *   57   73',
                '7    21   37   60   72',
                '4    26   35   49   67'
            ];

            cards.forEach(card => {
                const li = document.createElement('li');
                li.textContent = card;
                list.appendChild(li);
            });
        }

        // ==================== 5. የተጠሩ ቁጥሮችን ማጉላት ====================
        function highlightCalledNumbers() {
            // ከምስሉ የተወሰዱ የተጠሩ ቁጥሮች
            const calledNumbers = [
                13, 29, 40, 53, 71,
                5, 25, 34, 51, 68,
                8, 20, 57, 73,
                7, 21, 37, 60, 72,
                4, 26, 35, 49, 67
            ];
            
            // በተጨማሪ አንዳንድ ቁጥሮች ከ1-1000
            for (let i = 1; i <= 1000; i += 7) {
                calledNumbers.push(i);
            }
            
            calledNumbers.forEach(num => {
                const cell = document.getElementById(`num-${num}`);
                if (cell) {
                    cell.classList.add('called');
                }
            });
        }

        // ==================== 6. Confirm function ====================
        function confirmSelection() {
            const selectedCards = [
                [13, 29, 40, 53, 71],
                [5, 25, 34, 51, 68],
                [8, 20, '*', 57, 73],
                [7, 21, 37, 60, 72],
                [4, 26, 35, 49, 67]
            ];
            
            localStorage.setItem('selectedCards', JSON.stringify(selectedCards));
            
            const totalCards = selectedCards.length;
            const pricePerCard = 10;
            const totalPrice = totalCards * pricePerCard;
            
            localStorage.setItem('selectedCardCount', totalCards);
            localStorage.setItem('totalPrice', totalPrice);
            
            alert(`5 ካርዶች ተመርጠዋል!\nጠቅላላ ክፍያ: ${totalPrice} ብር`);
            
            // ወደ ክፍያ ገጽ መሄድ
            // window.location.href = 'payment.html';
        }

        // ==================== 7. Cancel function ====================
        function cancelSelection() {
            if (confirm('እርግጠኛ ነዎት መሰረዝ ይፈልጋሉ?')) {
                window.location.href = 'dashboard.html';
            }
        }

        // ==================== ሁሉንም አስጀምር ====================
        generateNumberGrid();
        generateBingoCard();
        displayCardNumbers();
        displaySelectedCards();
        highlightCalledNumbers();
    </script>
</body>
</html>
