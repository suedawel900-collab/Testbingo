<!DOCTYPE html>
<html>
<head>

<title>MK BINGO</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#6a5acd,#1e90ff);
color:white;
text-align:center;
margin:0;
}

#grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(35px,1fr));
gap:5px;
max-width:900px;
margin:auto;
padding:20px;
}

.box{
background:white;
color:black;
font-size:12px;
padding:7px;
border-radius:6px;
cursor:pointer;
}

.box:hover{
background:#ffd700;
}

.selected{
background:#32cd32;
color:white;
}

#preview{
margin:20px;
}

.previewCard{
background:#ffffff22;
padding:10px;
border-radius:10px;
display:inline-block;
margin:10px;
}

.gridCard{
display:grid;
grid-template-columns:repeat(5,40px);
gap:5px;
}

.cell{
background:white;
color:black;
padding:10px;
border-radius:5px;
font-weight:bold;
}

button{
padding:12px 30px;
font-size:18px;
border:none;
border-radius:10px;
background:#00c853;
color:white;
cursor:pointer;
margin:20px;
}

#gamePage{
display:none;
}

</style>

</head>

<body>

<h1>🎮 MK BINGO</h1>

<div id="selectPage">

<h3>Select Cards (1-1000)</h3>

<div id="grid"></div>

<h2>Card Preview</h2>

<div id="preview"></div>

<button onclick="confirmCards()">Confirm & Join Game</button>

</div>

<div id="gamePage">

<h2>Game Page</h2>

<div id="gameCards"></div>

</div>

<script>

let selectedCards={}
let grid=document.getElementById("grid")

for(let i=1;i<=1000;i++){

let d=document.createElement("div")
d.className="box"
d.innerText=i

d.onclick=()=>{

if(selectedCards[i]){

delete selectedCards[i]
d.classList.remove("selected")

}else{

selectedCards[i]=generateCard()
d.classList.add("selected")

}

updatePreview()

}

grid.appendChild(d)

}

function generateCard(){

let nums=[]

while(nums.length<25){

let n=Math.floor(Math.random()*75)+1
if(!nums.includes(n)) nums.push(n)

}

nums[12]="FREE"
return nums

}

function createCard(card){

let div=document.createElement("div")
div.className="previewCard"

let grid=document.createElement("div")
grid.className="gridCard"

card.forEach(n=>{

let c=document.createElement("div")
c.className="cell"
c.innerText=n
grid.appendChild(c)

})

div.appendChild(grid)

return div

}

function updatePreview(){

let preview=document.getElementById("preview")
preview.innerHTML=""

for(let c in selectedCards){

let card=createCard(selectedCards[c])
preview.appendChild(card)

}

}

function confirmCards(){

if(Object.keys(selectedCards).length==0){

alert("Select at least one card")
return

}

document.getElementById("selectPage").style.display="none"
document.getElementById("gamePage").style.display="block"

let game=document.getElementById("gameCards")

for(let c in selectedCards){

let title=document.createElement("h3")
title.innerText="Card #"+c

game.appendChild(title)

game.appendChild(createCard(selectedCards[c]))

}

}

</script>

</body>
</html>
