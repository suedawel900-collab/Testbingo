<!-- player/game.html -->
<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ቢንጎ ጨዋታ</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <div class="game-header">
            <h1>🎯 ቢንጎ ጨዋታ</h1>
            <div class="game-info">
                <div class="called-numbers" id="calledNumbers">
                    የተጠሩ ቁጥሮች:
                </div>
                <div class="last-number" id="lastNumber">-</div>
            </div>
        </div>

        <div class="game-controls">
            <label>
                <input type="checkbox" id="autoCall"> አውቶማቲክ ቁጥር መጥሪያ
            </label>
            <button onclick="callNumber()" class="btn btn-primary" id="manualCallBtn">
                ቁጥር ይጥሩ
            </button>
        </div>

        <div class="player-cards" id="playerCards"></div>

        <button onclick="checkBingo()" class="btn btn-success btn-bingo" id="bingoBtn">
            🎰 ቢንጎ!
        </button>
    </div>

    <!-- አሸናፊ ሞዳል -->
    <div id="winnerModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2>🎉 አሸናፊ ተገኝቷል!</h2>
            <div id="winnerInfo"></div>
            <button onclick="closeWinnerModal()" class="btn btn-primary">ዝጋ</button>
        </div>
    </div>

    <script type="module">
        import { database, ref, onValue, push, update, get, child } from '../js/firebase-config.js';

        const playerId = localStorage.getItem('playerId');
        let currentGame = null;
        let autoCallInterval = null;

        // የጨዋታ ሁኔታን መከታተል
        onValue(ref(database, 'activeGame'), (snapshot) => {
            const game = snapshot.val();
            if (game) {
                currentGame = game;
                updateGameDisplay(game);
                
                // አሸናፊ ካለ ማሳየት
                if (game.winners && game.winners.length > 0) {
                    showWinners(game);
                }
            }
        });

        function updateGameDisplay(game) {
            // የተጠሩ ቁጥሮችን ማሳየት
            if (game.calledNumbers) {
                document.getElementById('calledNumbers').innerHTML = 
                    'የተጠሩ ቁጥሮች: ' + game.calledNumbers.join(', ');
                
                if (game.calledNumbers.length > 0) {
                    document.getElementById('lastNumber').textContent = 
                        'የመጨረሻ ቁጥር: ' + game.calledNumbers[game.calledNumbers.length - 1];
                }
            }

            // የተጫዋች ካርዶችን ማሳየት
            if (game.players && game.players[playerId]) {
                displayPlayerCards(game.players[playerId].cards, game.calledNumbers || []);
            }
        }

        function displayPlayerCards(cards, calledNumbers) {
            const container = document.getElementById('playerCards');
            container.innerHTML = '';
            
            cards.forEach((card, index) => {
                const cardElement = document.createElement('div');
                cardElement.className = 'bingo-card player-card';
                
                let html = '<div class="bingo-card-header">ካርድ ' + (index + 1) + '</div>';
                html += '<div class="bingo-card-body">';
                
                // B I N G O headers
                html += '<div class="bingo-row header">';
                ['B', 'I', 'N', 'G', 'O'].forEach(letter => {
                    html += '<div class="bingo-cell header">' + letter + '</div>';
                });
                html += '</div>';
                
                // Numbers
                card.forEach(row => {
                    html += '<div class="bingo-row">';
                    row.forEach(num => {
                        const isMarked = num === 'FREE' || calledNumbers.includes(num);
                        const className = isMarked ? 'bingo-cell marked' : 'bingo-cell';
                        html += '<div class="' + className + '">' + (num || 'FREE') + '</div>';
                    });
                    html += '</div>';
                });
                
                html += '</div>';
                cardElement.innerHTML = html;
                container.appendChild(cardElement);
            });
        }

        window.callNumber = function() {
            if (currentGame && currentGame.status === 'active') {
                const newNumber = generateRandomNumber();
                
                // ቁጥሩ አዲስ መሆኑን ማረጋገጥ
                if (!currentGame.calledNumbers || !currentGame.calledNumbers.includes(newNumber)) {
                    const updates = {};
                    const calledNumbers = currentGame.calledNumbers || [];
                    calledNumbers.push(newNumber);
                    
                    updates['activeGame/calledNumbers'] = calledNumbers;
                    
                    update(ref(database), updates);
                }
            }
        };

        function generateRandomNumber() {
            return Math.floor(Math.random() * 75) + 1;
        }

        // አውቶማቲክ ቁጥር መጥሪያ
        document.getElementById('autoCall').addEventListener('change', function(e) {
            if (e.target.checked) {
                autoCallInterval = setInterval(() => {
                    if (currentGame && currentGame.status === 'active' && !currentGame.winners) {
                        callNumber();
                    }
                }, 3000); // በየ 3 ሰከንዱ
            } else {
                clearInterval(autoCallInterval);
            }
        });

        window.checkBingo = function() {
            if (!currentGame) return;
            
            const playerCards = currentGame.players[playerId].cards;
            const calledNumbers = currentGame.calledNumbers || [];
            
            // ማንኛውም ካርድ ቢንጎ መሆኑን ማረጋገጥ
            let bingoCard = null;
            let bingoType = null;
            
            for (let cardIndex = 0; cardIndex < playerCards.length; cardIndex++) {
                const result = checkCardForBingo(playerCards[cardIndex], calledNumbers);
                if (result.isBingo) {
                    bingoCard = cardIndex;
                    bingoType = result.type;
                    break;
                }
            }
            
            if (bingoCard !== null) {
                // ቢንጎውን ማስመዝገብ
                const bingoData = {
                    playerId: playerId,
                    cardIndex: bingoCard,
                    type: bingoType,
                    timestamp: Date.now()
                };
                
                const bingoRef = push(ref(database, 'activeGame/bingoClaims'));
                set(bingoRef, bingoData);
            } else {
                alert('ቢንጎ የለም! ትክክለኛዎቹን ቁጥሮች ይጠብቁ።');
            }
        };

        function checkCardForBingo(card, calledNumbers) {
            // ረድፎችን ማረጋገጥ
            for (let row = 0; row < 5; row++) {
                let rowComplete = true;
                for (let col = 0; col < 5; col++) {
                    const num = card[row][col];
                    if (num !== 'FREE' && !calledNumbers.includes(num)) {
                        rowComplete = false;
                        break;
                    }
                }
                if (rowComplete) {
                    return { isBingo: true, type: 'row' };
                }
            }
            
            // አምዶችን ማረጋገጥ
            for (let col = 0; col < 5; col++) {
                let colComplete = true;
                for (let row = 0; row < 5; row++) {
                    const num = card[row][col];
                    if (num !== 'FREE' && !calledNumbers.includes(num)) {
                        colComplete = false;
                        break;
                    }
                }
                if (colComplete) {
                    return { isBingo: true, type: 'column' };
                }
            }
            
            // ዲያግናልን ማረጋገጥ
            let diag1Complete = true;
            let diag2Complete = true;
            
            for (let i = 0; i < 5; i++) {
                const num1 = card[i][i];
                const num2 = card[i][4 - i];
                
                if (num1 !== 'FREE' && !calledNumbers.includes(num1)) diag1Complete = false;
                if (num2 !== 'FREE' && !calledNumbers.includes(num2)) diag2Complete = false;
            }
            
            if (diag1Complete || diag2Complete) {
                return { isBingo: true, type: 'diagonal' };
            }
            
            return { isBingo: false };
        }

        function showWinners(game) {
            const modal = document.getElementById('winnerModal');
            const winnerInfo = document.getElementById('winnerInfo');
            
            let html = '<div class="winners-list">';
            game.winners.forEach(winner => {
                html += `
                    <div class="winner-item">
                        <h3>አሸናፊ: ${winner.playerId}</h3>
                        <p>አሸናፊ ካርድ: ${winner.cardIndex + 1}</p>
                        <p>አሸናፊ አይነት: ${winner.type}</p>
                        <p>ሽልማት: ${winner.prize} ብር</p>
                    </div>
                `;
            });
            html += '</div>';
            
            winnerInfo.innerHTML = html;
            modal.style.display = 'block';
        }

        window.closeWinnerModal = function() {
            document.getElementById('winnerModal').style.display = 'none';
        }
    </script>
</body>
</html>
