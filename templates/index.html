<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK BINGO - Card Selection</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 10px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 20px;
        }
        h1 { text-align: center; color: gold; }
        .balance {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 30px;
            max-width: 200px;
            margin: 10px auto;
            text-align: center;
            border: 2px solid gold;
        }
        .balance span { color: gold; font-size: 1.5em; font-weight: bold; }
        
        /* Range Selector */
        .range-selector {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 15px 0;
        }
        .range-btn {
            padding: 8px 12px;
            background: rgba(255,215,0,0.2);
            border: 1px solid gold;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }
        .range-btn:hover {
            background: gold;
            color: black;
        }
        
        /* Card Grid */
        .grid-container {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 10px;
            max-height: 300px;
            overflow-y: auto;
        }
        #grid {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 2px;
        }
        .box {
            background: white;
            color: black;
            padding: 5px 0;
            font-size: 0.6em;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 3px;
        }
        .box.available { background: white; border-color: #4CAF50; }
        .box.selected { background: #4CAF50; color: white; border-color: gold; }
        .box.purchased { 
            background: #ccc; 
            color: #666; 
            border-color: #f44336; 
            cursor: not-allowed;
            position: relative;
        }
        .box.purchased::after {
            content: "❌";
            position: absolute;
            top: -5px;
            right: -5px;
            font-size: 8px;
            background: #f44336;
            color: white;
            border-radius: 50%;
            width: 12px;
            height: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .box.own-purchased {
            background: #4CAF50;
            color: white;
            border-color: gold;
            cursor: default;
        }
        
        /* Summary Bar */
        .summary-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 20px;
            margin: 10px 0;
        }
        
        /* Buttons */
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            background: #4CAF50;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
        }
        .cancel-btn { background: #f44336; }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Message */
        .message-box {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #f44336;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            border: 2px solid gold;
            display: none;
            z-index: 1000;
        }
        
        /* Legend */
        .legend {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 10px 0;
            font-size: 0.8em;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .color-available { width: 20px; height: 20px; background: white; border: 2px solid #4CAF50; }
        .color-selected { width: 20px; height: 20px; background: #4CAF50; border: 2px solid gold; }
        .color-purchased { width: 20px; height: 20px; background: #ccc; border: 2px solid #f44336; position: relative; }
        .color-purchased::after { content: "❌"; position: absolute; top: -5px; right: -5px; font-size: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎰 MK BINGO</h1>
        
        <div class="balance">
            <span id="playerBalance">{{ balance|default('1000') }}</span> ETB
        </div>

        <div class="legend">
            <div class="legend-item"><div class="color-available"></div><span>Available</span></div>
            <div class="legend-item"><div class="color-selected"></div><span>Selected</span></div>
            <div class="legend-item"><div class="color-purchased"></div><span>Sold</span></div>
        </div>

        <div id="selectPage">
            <h3 style="text-align: center;">Select Cards (1-1000)</h3>
            
            <div class="range-selector" id="rangeSelector"></div>
            
            <div class="grid-container">
                <div id="grid"></div>
            </div>

            <div class="summary-bar">
                <span>Your Cards: <span id="selectedCount">0</span></span>
                <span>Total: <span id="totalPrice">0</span> ETB</span>
            </div>

            <div style="text-align: center;">
                <button onclick="confirmCards()" id="confirmBtn" disabled>✅ BUY CARDS</button>
                <button class="cancel-btn" onclick="cancelSelection()">❌ CLEAR</button>
            </div>
        </div>
    </div>

    <div id="message" class="message-box"></div>

    <script>
        let selectedCards = {};
        let playerBalance = {{ balance|default(1000) }};
        let userId = "{{ user_id|default('guest') }}";
        let purchasedCards = new Set();
        let myCards = new Set();
        
        const API_URL = window.location.origin;

        // Check if user is guest - show warning
        if (userId === 'guest') {
            showMessage('⚠️ You are in guest mode. Use Telegram to play with real balance!');
        }

        window.onload = function() {
            createGrid();
            createRangeSelector();
            loadCardStatus();
        };

        function createRangeSelector() {
            let selector = document.getElementById('rangeSelector');
            let ranges = [[1,200], [201,400], [401,600], [601,800], [801,1000]];
            ranges.forEach(r => {
                let btn = document.createElement('button');
                btn.className = 'range-btn';
                btn.innerText = r[0] + '-' + r[1];
                btn.onclick = () => {
                    let firstCard = document.getElementById(`card-${r[0]}`);
                    if (firstCard) firstCard.scrollIntoView({behavior: 'smooth'});
                };
                selector.appendChild(btn);
            });
        }

        function createGrid() {
            let grid = document.getElementById('grid');
            for (let i = 1; i <= 1000; i++) {
                let box = document.createElement('div');
                box.className = 'box available';
                box.id = `card-${i}`;
                box.innerText = i;
                box.onclick = () => handleCardClick(i, box);
                grid.appendChild(box);
            }
        }

        async function loadCardStatus() {
            try {
                let url = `${API_URL}/api/cards/status`;
                if (userId !== 'guest') {
                    url += `?user_id=${userId}`;
                }
                let res = await fetch(url);
                let data = await res.json();
                if (data.success) {
                    purchasedCards = new Set(data.purchased);
                    myCards = new Set(data.my_cards);
                    updateGridDisplay();
                }
            } catch (e) {
                console.log('Error loading cards:', e);
            }
        }

        function updateGridDisplay() {
            for (let i = 1; i <= 1000; i++) {
                let box = document.getElementById(`card-${i}`);
                if (!box) continue;
                if (myCards.has(i)) {
                    box.className = 'box own-purchased';
                } else if (purchasedCards.has(i)) {
                    box.className = 'box purchased';
                } else if (selectedCards[i]) {
                    box.className = 'box selected';
                } else {
                    box.className = 'box available';
                }
            }
        }

        function handleCardClick(num, box) {
            // Guest users cannot select cards
            if (userId === 'guest') {
                showMessage('❌ Please use Telegram to play the game!');
                return;
            }
            
            if (purchasedCards.has(num) && !myCards.has(num)) {
                showMessage('❌ Card already purchased!');
                return;
            }
            if (myCards.has(num)) {
                showMessage('ℹ️ You already own this card!');
                return;
            }
            
            if (selectedCards[num]) {
                delete selectedCards[num];
                if (!purchasedCards.has(num)) {
                    box.className = 'box available';
                }
            } else {
                let total = (Object.keys(selectedCards).length + 1) * 10;
                if (total > playerBalance) {
                    showMessage('❌ Insufficient balance!');
                    return;
                }
                selectedCards[num] = true;
                box.className = 'box selected';
            }
            updateSummary();
        }

        function updateSummary() {
            let count = Object.keys(selectedCards).length;
            document.getElementById('selectedCount').innerText = count;
            document.getElementById('totalPrice').innerText = count * 10;
            document.getElementById('confirmBtn').disabled = count === 0;
        }

        function showMessage(text) {
            let msg = document.getElementById('message');
            msg.style.display = 'block';
            msg.innerText = text;
            setTimeout(() => msg.style.display = 'none', 3000);
        }

        async function confirmCards() {
            // Guest users cannot purchase
            if (userId === 'guest') {
                showMessage('❌ Please use Telegram to play!');
                return;
            }
            
            let cards = Object.keys(selectedCards).map(Number);
            if (cards.length === 0) {
                showMessage('❌ Select cards first!');
                return;
            }
            
            let total = cards.length * 10;
            
            try {
                let res = await fetch(`${API_URL}/api/game/purchase`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: userId,
                        cards: cards,
                        total_price: total
                    })
                });
                
                let data = await res.json();
                
                if (data.success) {
                    playerBalance = data.new_balance;
                    document.getElementById('playerBalance').innerText = playerBalance;
                    
                    cards.forEach(c => {
                        myCards.add(c);
                        purchasedCards.add(c);
                    });
                    
                    selectedCards = {};
                    updateGridDisplay();
                    updateSummary();
                    
                    showMessage(`✅ Successfully purchased ${cards.length} cards!`);
                    
                    // Redirect to waiting page or game
                    setTimeout(() => {
                        window.location.href = `/game?user=${userId}`;
                    }, 2000);
                    
                } else {
                    showMessage(`❌ ${data.error || 'Purchase failed'}`);
                    if (data.conflicts) {
                        console.log('Conflicts:', data.conflicts);
                    }
                }
            } catch (e) {
                showMessage('❌ Error purchasing cards');
                console.error(e);
            }
        }

        function cancelSelection() {
            if (Object.keys(selectedCards).length > 0 && confirm('Clear all selections?')) {
                selectedCards = {};
                updateGridDisplay();
                updateSummary();
            }
        }
    </script>
</body>
</html>
