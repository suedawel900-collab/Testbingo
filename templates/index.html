<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MK BINGO - Compact</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            color: white;
            padding: 8px;
        }

        /* Ultra Compact Container */
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,215,0,0.3);
        }

        h1 {
            text-align: center;
            font-size: 1.6em;
            margin-bottom: 5px;
            color: gold;
            text-shadow: 0 0 5px gold;
        }

        /* Balance Box - Mini */
        .balance-box {
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 20px;
            max-width: 150px;
            margin: 5px auto;
            border: 1px solid gold;
            text-align: center;
            font-size: 0.9em;
        }

        .balance-box span {
            font-size: 1.2em;
            font-weight: bold;
            color: gold;
        }

        /* Game Status - Mini Row */
        .game-info {
            background: rgba(0,0,0,0.3);
            padding: 5px;
            border-radius: 10px;
            margin: 5px 0;
            display: flex;
            justify-content: space-around;
            font-size: 0.8em;
        }

        .info-value {
            font-weight: bold;
            color: gold;
        }

        /* ===== AUTO/MANUAL TOGGLE - PROMINENT ===== */
        .mode-container {
            background: rgba(0,0,0,0.4);
            padding: 10px;
            border-radius: 30px;
            margin: 10px 0;
            border: 2px solid gold;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .mode-label {
            font-weight: bold;
            font-size: 1em;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 100px;
            height: 40px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #f44336, #d32f2f);
            transition: .4s;
            border-radius: 40px;
            border: 2px solid white;
        }

        .slider:before {
            position: absolute;
            content: "MANUAL";
            height: 32px;
            width: 50px;
            left: 4px;
            bottom: 3px;
            background: white;
            transition: .4s;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7em;
            font-weight: bold;
            color: black;
        }

        input:checked + .slider {
            background: linear-gradient(135deg, #4CAF50, #45a049);
        }

        input:checked + .slider:before {
            content: "AUTO";
            transform: translateX(50px);
        }

        .mode-status {
            font-size: 0.8em;
            padding: 3px 10px;
            border-radius: 20px;
            background: rgba(255,255,255,0.2);
        }

        /* Called Numbers - Mini Scroll */
        .called-numbers {
            background: rgba(0,0,0,0.3);
            padding: 8px;
            border-radius: 10px;
            margin: 8px 0;
            min-height: 50px;
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
        }

        .number-ball {
            display: inline-block;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: gold;
            color: black;
            text-align: center;
            line-height: 28px;
            font-weight: bold;
            font-size: 0.7em;
        }

        /* BINGO Button */
        .bingo-btn {
            background: #f44336;
            color: white;
            font-size: 1.3em;
            padding: 10px 30px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            width: 100%;
            margin: 8px 0;
            animation: pulse 1.5s infinite;
        }

        .bingo-btn:disabled {
            opacity: 0.5;
            animation: none;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        /* ===== MINIMIZED 5x5 BINGO CARDS ===== */
        .cards-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            max-height: 400px;
            overflow-y: auto;
            padding: 5px;
        }

        .bingo-card {
            background: white;
            border-radius: 8px;
            padding: 6px;
            width: 220px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            position: relative;
        }

        /* Card Header - Mini */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
            font-size: 0.7em;
        }

        .card-number {
            color: gold;
            font-weight: bold;
            background: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border-radius: 10px;
        }

        .card-status {
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 0.7em;
            font-weight: bold;
        }

        .card-status.active {
            background: #4CAF50;
            color: white;
        }

        .card-status.disabled {
            background: #f44336;
            color: white;
        }

        /* BINGO Header - Mini */
        .bingo-header {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px;
            margin-bottom: 2px;
        }

        .bingo-letter {
            background: gold;
            color: black;
            text-align: center;
            padding: 4px 0;
            font-weight: bold;
            font-size: 0.8em;
            border-radius: 4px;
        }

        /* 5x5 Grid - Mini */
        .gridCard {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px;
        }

        .cell {
            background: #f0f0f0;
            color: #333;
            padding: 6px 0;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.7em;
            text-align: center;
            border: 1px solid #ccc;
            cursor: pointer;
        }

        .cell.marked {
            background: #4CAF50;
            color: white;
        }

        .cell.free {
            background: gold;
            color: black;
        }

        .cell.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Disabled Card Overlay */
        .card-disabled {
            opacity: 0.6;
            filter: grayscale(50%);
        }

        .card-disabled::after {
            content: "❌";
            position: absolute;
            top: 5px;
            right: 5px;
            font-size: 1.2em;
        }

        /* Card Selection Grid - Mini */
        #grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 2px;
            max-height: 150px;
            overflow-y: auto;
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            margin: 8px 0;
        }

        .box {
            background: white;
            color: black;
            padding: 4px 0;
            border-radius: 3px;
            font-size: 0.6em;
            text-align: center;
            cursor: pointer;
        }

        .box.selected {
            background: #4CAF50;
            color: white;
        }

        /* Summary Bar */
        .summary-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            padding: 5px 10px;
            border-radius: 20px;
            margin: 5px 0;
            font-size: 0.8em;
        }

        /* Buttons */
        button {
            padding: 8px 15px;
            font-size: 0.8em;
            border: none;
            border-radius: 20px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
            margin: 3px;
            font-weight: bold;
        }

        .cancel-btn {
            background: #f44336;
        }

        /* Winners */
        .winners-list {
            margin-top: 10px;
            padding: 8px;
            background: rgba(255,215,0,0.2);
            border-radius: 8px;
        }

        .winner-item {
            padding: 5px;
            margin: 3px 0;
            background: rgba(0,0,0,0.3);
            border-radius: 5px;
            font-size: 0.7em;
            border-left: 3px solid gold;
        }

        .info-text {
            text-align: center;
            font-size: 0.7em;
            color: rgba(255,255,255,0.7);
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎰 MK BINGO</h1>

        <!-- Balance -->
        <div class="balance-box">
            <span id="playerBalance">{{ balance|default('1000') }}</span> ETB
        </div>

        <!-- Game Status -->
        <div class="game-info">
            <div>Cards: <span class="info-value" id="totalCardsSold">0</span></div>
            <div>Players: <span class="info-value" id="totalPlayers">0</span></div>
            <div>Prize: <span class="info-value" id="prizePool">0</span></div>
        </div>

        <!-- SELECTION PAGE -->
        <div id="selectPage">
            <h3 style="text-align: center; font-size: 1em;">🎫 Select Cards (1-1000)</h3>
            
            <!-- Range Selector -->
            <div style="display: flex; gap: 3px; flex-wrap: wrap; justify-content: center; margin: 5px 0;" id="rangeSelector"></div>
            
            <!-- Card Grid -->
            <div id="grid"></div>

            <div class="summary-bar">
                <span>Your: <span id="selectedCount">0</span></span>
                <span>Total: <span id="totalPrice">0</span> ETB</span>
            </div>

            <div style="text-align: center;">
                <button onclick="confirmCards()" id="confirmBtn">✅ BUY</button>
                <button class="cancel-btn" onclick="cancelSelection()">❌ CLEAR</button>
            </div>
            
            <div class="info-text">
                * 10 cards min • 30s countdown
            </div>
        </div>

        <!-- GAME PAGE -->
        <div id="gamePage" style="display: none;">
            <!-- Timer -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                <span style="font-size: 0.9em;">🎯 Game</span>
                <span class="timer" id="gameTimer" style="font-size: 1.2em; color: gold;">00:00</span>
            </div>

            <!-- ===== AUTO/MANUAL TOGGLE - PROMINENT ===== -->
            <div class="mode-container">
                <span class="mode-label">✋ MANUAL</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="markModeToggle" checked onchange="toggleMarkMode()">
                    <span class="slider"></span>
                </label>
                <span class="mode-label">🔄 AUTO</span>
            </div>
            <div id="modeStatus" class="mode-status" style="text-align: center; margin-bottom: 5px;">
                ✅ AUTO MODE: Numbers mark automatically
            </div>

            <!-- Called Numbers -->
            <div class="called-numbers" id="numbersList"></div>

            <!-- BINGO Button -->
            <button class="bingo-btn" onclick="callBingo()" id="bingoBtn" disabled>🔴 BINGO!</button>

            <!-- Game Cards - Minimized 5x5 -->
            <div class="cards-container" id="gameCards"></div>

            <!-- Back Button -->
            <div style="text-align: center; margin-top: 8px;">
                <button onclick="backToSelection()">🔙 BACK</button>
            </div>

            <!-- Winners -->
            <div id="winnersDisplay" class="winners-list" style="display: none;"></div>
        </div>
    </div>

    <script>
        // ==================== GLOBAL VARIABLES ====================
        let selectedCards = {};
        let playerBalance = {{ balance|default(1000) }};
        let userId = "{{ user_id|default('guest') }}";
        
        // Game cards
        let currentGameCards = {};  // { cardNumber: { numbers: [...], active: true } }
        
        let gameSettings = {
            calledNumbers: [],
            winners: [],
            isGameActive: false,
            gameType: 'full house',
            prizeAmount: 2000,
            cardPrice: 10,
            minCardsToStart: 10
        };
        
        // Marking mode: true = AUTO, false = MANUAL
        let autoMarkEnabled = true;
        
        // Track manually marked numbers
        let manuallyMarked = {};  // { cardNumber: Set(markedNumbers) }
        
        // Track disabled cards (false bingo)
        let disabledCards = new Set();
        
        let gameTimer = null;
        let callInterval = null;
        let gameStarted = false;
        let bingoButtonEnabled = false;

        const API_URL = window.location.origin;

        // ==================== INIT ====================
        window.onload = function() {
            createNumberGrid();
            createRangeSelector();
            updateSummary();
        };

        // ==================== RANGE SELECTOR ====================
        function createRangeSelector() {
            let selector = document.getElementById("rangeSelector");
            let ranges = [
                {start: 1, end: 200}, {start: 201, end: 400}, {start: 401, end: 600},
                {start: 601, end: 800}, {start: 801, end: 1000}
            ];
            
            ranges.forEach(range => {
                let btn = document.createElement("button");
                btn.style.padding = '3px 6px';
                btn.style.fontSize = '0.7em';
                btn.style.background = 'rgba(255,215,0,0.2)';
                btn.style.border = '1px solid gold';
                btn.style.borderRadius = '10px';
                btn.style.color = 'white';
                btn.style.cursor = 'pointer';
                btn.innerText = `${range.start}-${range.end}`;
                btn.onclick = () => scrollToRange(range.start);
                selector.appendChild(btn);
            });
        }

        function scrollToRange(start) {
            let grid = document.getElementById("grid");
            let firstCard = document.getElementById(`card-${start}`);
            if (firstCard) firstCard.scrollIntoView({behavior: 'smooth', block: 'center'});
        }

        // ==================== CREATE 1000 CARD GRID ====================
        function createNumberGrid() {
            let grid = document.getElementById("grid");
            grid.innerHTML = "";
            
            for (let i = 1; i <= 1000; i++) {
                let box = document.createElement("div");
                box.className = "box";
                box.innerText = i;
                box.id = `card-${i}`;

                box.onclick = () => {
                    if (gameStarted) {
                        alert("Game in progress!");
                        return;
                    }
                    
                    if (selectedCards[i]) {
                        delete selectedCards[i];
                        box.classList.remove("selected");
                    } else {
                        selectedCards[i] = generateBingoCard(i);
                        box.classList.add("selected");
                    }
                    updateSummary();
                };
                grid.appendChild(box);
            }
        }

        // ==================== GENERATE BINGO CARD ====================
        function generateBingoCard(cardNumber) {
            let card = new Array(25).fill(0);
            let seed = cardNumber || Math.floor(Math.random() * 1000);
            
            // Generate columns
            let bCol = []; while (bCol.length < 5) { let n = ((seed * 1 + bCol.length * 7) % 15) + 1; if (!bCol.includes(n)) bCol.push(n); }
            let iCol = []; while (iCol.length < 5) { let n = ((seed * 2 + iCol.length * 7) % 15) + 16; if (!iCol.includes(n)) iCol.push(n); }
            let nCol = []; while (nCol.length < 5) { let n = ((seed * 3 + nCol.length * 7) % 15) + 31; if (!nCol.includes(n)) nCol.push(n); }
            let gCol = []; while (gCol.length < 5) { let n = ((seed * 4 + gCol.length * 7) % 15) + 46; if (!gCol.includes(n)) gCol.push(n); }
            let oCol = []; while (oCol.length < 5) { let n = ((seed * 5 + oCol.length * 7) % 15) + 61; if (!oCol.includes(n)) oCol.push(n); }
            
            // Fill card row by row
            for (let row = 0; row < 5; row++) {
                card[row * 5 + 0] = bCol[row];
                card[row * 5 + 1] = iCol[row];
                card[row * 5 + 2] = nCol[row];
                card[row * 5 + 3] = gCol[row];
                card[row * 5 + 4] = oCol[row];
            }
            card[12] = "FREE"; // Center cell
            return card;
        }

        // ==================== TOGGLE MARK MODE ====================
        function toggleMarkMode() {
            autoMarkEnabled = document.getElementById('markModeToggle').checked;
            let status = document.getElementById('modeStatus');
            
            if (autoMarkEnabled) {
                status.innerHTML = '✅ AUTO MODE: Numbers mark automatically';
                status.style.background = 'rgba(76, 175, 80, 0.3)';
            } else {
                status.innerHTML = '✋ MANUAL MODE: Click cells to mark numbers';
                status.style.background = 'rgba(244, 67, 54, 0.3)';
            }
        }

        // ==================== CHECK IF NUMBER IS MARKED ====================
        function isNumberMarked(cardNum, number) {
            if (number === "FREE") return true;
            if (disabledCards.has(cardNum)) return false;
            if (autoMarkEnabled) return gameSettings.calledNumbers.includes(number);
            return manuallyMarked[cardNum]?.has(number) || false;
        }

        // ==================== UPDATE SUMMARY ====================
        function updateSummary() {
            let count = Object.keys(selectedCards).length;
            let total = count * gameSettings.cardPrice;
            document.getElementById("selectedCount").innerText = count;
            document.getElementById("totalPrice").innerText = total;
        }

        // ==================== CONFIRM CARDS ====================
        async function confirmCards() {
            let count = Object.keys(selectedCards).length;
            let total = count * gameSettings.cardPrice;
            
            if (count === 0) return alert("Select cards!");
            if (count < 10) return alert(`Need 10 cards (you have ${count})`);
            if (playerBalance < total) return alert(`Need ${total} ETB`);
            
            playerBalance -= total;
            document.getElementById("playerBalance").innerText = playerBalance;
            
            // Save cards
            for (let cardNum in selectedCards) {
                currentGameCards[cardNum] = {
                    numbers: selectedCards[cardNum],
                    active: true
                };
            }
            
            disabledCards.clear();
            manuallyMarked = {};
            
            alert(`✅ ${count} cards purchased!`);
            showGamePage();
        }

        function cancelSelection() {
            if (Object.keys(selectedCards).length > 0 && confirm("Clear all?")) {
                selectedCards = {};
                document.querySelectorAll(".box").forEach(b => b.classList.remove("selected"));
                updateSummary();
            }
        }

        // ==================== SHOW GAME PAGE ====================
        function showGamePage() {
            document.getElementById("selectPage").style.display = "none";
            document.getElementById("gamePage").style.display = "block";
            
            gameStarted = true;
            gameSettings.isGameActive = true;
            
            startTimer();
            showGameCards();
            startNumberCalls();
        }

        // ==================== SHOW MINIMIZED GAME CARDS ====================
        function showGameCards() {
            let container = document.getElementById("gameCards");
            container.innerHTML = "";
            
            for (let cardNum in currentGameCards) {
                let cardData = currentGameCards[cardNum];
                let isDisabled = disabledCards.has(parseInt(cardNum));
                
                let div = document.createElement("div");
                div.className = "bingo-card";
                if (isDisabled) div.classList.add("card-disabled");

                // Card Header
                let header = document.createElement("div");
                header.className = "card-header";
                
                let numberSpan = document.createElement("span");
                numberSpan.className = "card-number";
                numberSpan.innerText = `#${cardNum}`;
                
                let statusSpan = document.createElement("span");
                statusSpan.className = `card-status ${isDisabled ? 'disabled' : 'active'}`;
                statusSpan.innerText = isDisabled ? '❌' : '✓';
                
                header.appendChild(numberSpan);
                header.appendChild(statusSpan);
                div.appendChild(header);

                // BINGO Header
                let bingoHeader = document.createElement("div");
                bingoHeader.className = "bingo-header";
                ['B', 'I', 'N', 'G', 'O'].forEach(letter => {
                    let l = document.createElement("div");
                    l.className = "bingo-letter";
                    l.innerText = letter;
                    bingoHeader.appendChild(l);
                });
                div.appendChild(bingoHeader);

                // 5x5 Grid
                let grid = document.createElement("div");
                grid.className = "gridCard";

                cardData.numbers.forEach((num, index) => {
                    let cell = document.createElement("div");
                    cell.className = "cell";
                    
                    if (num === "FREE") {
                        cell.classList.add("free");
                    } else if (isNumberMarked(parseInt(cardNum), num)) {
                        cell.classList.add("marked");
                    }
                    
                    // Click handler for manual marking
                    if (!isDisabled && !autoMarkEnabled && num !== "FREE") {
                        cell.onclick = function() {
                            if (!manuallyMarked[cardNum]) manuallyMarked[cardNum] = new Set();
                            if (manuallyMarked[cardNum].has(num)) {
                                manuallyMarked[cardNum].delete(num);
                                this.classList.remove("marked");
                            } else {
                                manuallyMarked[cardNum].add(num);
                                this.classList.add("marked");
                            }
                        };
                    }
                    
                    cell.innerText = num;
                    grid.appendChild(cell);
                });

                div.appendChild(grid);
                container.appendChild(div);
            }
        }

        // ==================== CHECK FOR WIN ====================
        function checkForWin() {
            let winners = [];
            for (let cardNum in currentGameCards) {
                if (disabledCards.has(parseInt(cardNum))) continue;
                let card = currentGameCards[cardNum].numbers;
                let allMarked = true;
                for (let i = 0; i < card.length; i++) {
                    if (card[i] !== "FREE" && !isNumberMarked(parseInt(cardNum), card[i])) {
                        allMarked = false;
                        break;
                    }
                }
                if (allMarked) winners.push({ cardNumber: cardNum });
            }
            return winners;
        }

        // ==================== CALL BINGO ====================
        function callBingo() {
            if (!bingoButtonEnabled) return alert("Wait for numbers!");
            
            let winners = checkForWin();
            
            if (winners.length > 0) {
                // Real BINGO
                gameSettings.winners = gameSettings.winners.concat(winners);
                let prizePerWinner = gameSettings.prizeAmount / gameSettings.winners.length;
                
                let winnersDiv = document.getElementById("winnersDisplay");
                winnersDiv.style.display = "block";
                winnersDiv.innerHTML = "<h4 style='color:gold;'>🏆 WINNERS</h4>";
                
                gameSettings.winners.forEach((winner, index) => {
                    let div = document.createElement("div");
                    div.className = "winner-item";
                    div.innerHTML = `Winner #${index + 1} - Card #${winner.cardNumber} - ${prizePerWinner} ETB`;
                    winnersDiv.appendChild(div);
                });
                
                alert(`🎉 BINGO! You win ${prizePerWinner} ETB!`);
                
                document.getElementById('bingoBtn').disabled = true;
                bingoButtonEnabled = false;
                gameSettings.isGameActive = false;
                clearInterval(callInterval);
                
                playerBalance += prizePerWinner;
                document.getElementById("playerBalance").innerText = playerBalance;
                
            } else {
                // False BINGO - disable one card
                let activeCards = [];
                for (let cardNum in currentGameCards) {
                    if (!disabledCards.has(parseInt(cardNum))) activeCards.push(parseInt(cardNum));
                }
                
                if (activeCards.length > 0) {
                    let cardToDisable = activeCards[0];
                    disabledCards.add(cardToDisable);
                    alert(`❌ False BINGO! Card #${cardToDisable} disabled`);
                    showGameCards();
                }
            }
        }

        // ==================== BACK TO SELECTION ====================
        function backToSelection() {
            if (gameTimer) clearInterval(gameTimer);
            if (callInterval) clearInterval(callInterval);
            
            document.getElementById("selectPage").style.display = "block";
            document.getElementById("gamePage").style.display = "none";
            
            gameStarted = false;
            gameSettings.isGameActive = false;
            gameSettings.calledNumbers = [];
            gameSettings.winners = [];
            disabledCards.clear();
            manuallyMarked = {};
            document.getElementById('numbersList').innerHTML = '';
        }

        // ==================== START NUMBER CALLS ====================
        function startNumberCalls() {
            gameSettings.calledNumbers = [];
            
            callInterval = setInterval(() => {
                if (!gameSettings.isGameActive) return;
                
                let num = Math.floor(Math.random() * 75) + 1;
                if (!gameSettings.calledNumbers.includes(num)) {
                    gameSettings.calledNumbers.push(num);
                    
                    let list = document.getElementById('numbersList');
                    let ball = document.createElement('span');
                    ball.className = 'number-ball';
                    ball.innerText = num;
                    list.appendChild(ball);
                    
                    showGameCards();
                    
                    document.getElementById('bingoBtn').disabled = false;
                    bingoButtonEnabled = true;
                }
            }, 3000);
        }

        // ==================== TIMER ====================
        function startTimer() {
            let seconds = 0;
            gameTimer = setInterval(() => {
                seconds++;
                let mins = Math.floor(seconds / 60);
                let secs = seconds % 60;
                document.getElementById('gameTimer').innerText = 
                    `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            }, 1000);
        }
    </script>
</body>
</html>
