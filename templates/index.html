<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MK BINGO - Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            color: white;
            padding: 10px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,215,0,0.3);
        }

        h1 {
            text-align: center;
            font-size: 2em;
            margin-bottom: 10px;
            color: gold;
            text-shadow: 0 0 10px gold;
        }

        /* Balance Box */
        .balance-box {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 15px;
            max-width: 200px;
            margin: 10px auto;
            border: 2px solid gold;
            text-align: center;
        }

        .balance-box span {
            font-size: 1.5em;
            font-weight: bold;
            color: gold;
        }

        /* Game Status */
        .game-info {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            display: flex;
            justify-content: space-around;
            font-size: 0.9em;
        }

        .info-item {
            text-align: center;
        }

        .info-value {
            font-size: 1.2em;
            color: gold;
        }

        /* Range Selector */
        .range-selector {
            display: flex;
            gap: 5px;
            margin: 10px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .range-btn {
            padding: 8px 15px;
            font-size: 0.9em;
            background: rgba(255,215,0,0.2);
            border: 1px solid gold;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }

        .range-btn:hover {
            background: gold;
            color: black;
        }

        /* Card Grid */
        .grid-container {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 10px;
            margin: 10px 0;
            max-height: 300px;
            overflow-y: auto;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 2px;
        }

        .box {
            background: white;
            color: black;
            padding: 5px 0;
            border-radius: 3px;
            font-size: 0.6em;
            text-align: center;
            cursor: pointer;
            border: 1px solid #ccc;
        }

        .box.selected {
            background: #4CAF50;
            color: white;
            border-color: gold;
        }

        /* Summary Bar */
        .summary-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            padding: 10px 15px;
            border-radius: 20px;
            margin: 10px 0;
            font-size: 1em;
        }

        .summary-bar span {
            color: gold;
            font-weight: bold;
        }

        /* Buttons */
        button {
            padding: 12px 25px;
            font-size: 1em;
            border: none;
            border-radius: 25px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
            margin: 5px;
            font-weight: bold;
        }

        .cancel-btn {
            background: #f44336;
        }

        .bingo-btn {
            background: #f44336;
            font-size: 1.5em;
            padding: 15px 40px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Preview Section */
        .preview-container {
            overflow-x: auto;
            white-space: nowrap;
            padding: 10px 0;
            margin: 10px 0;
        }

        #preview {
            display: inline-flex;
            gap: 15px;
        }

        .preview-card {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 10px;
            border: 2px solid gold;
            min-width: 180px;
            display: inline-block;
        }

        .preview-card h4 {
            color: gold;
            text-align: center;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px;
        }

        .preview-cell {
            background: white;
            color: black;
            text-align: center;
            padding: 3px 0;
            font-size: 0.6em;
            border-radius: 2px;
        }

        .preview-cell.free {
            background: gold;
        }

        /* ===== PROPER BINGO CARD STYLES ===== */
        .bingo-card {
            background: white;
            border-radius: 10px;
            padding: 10px;
            margin: 15px auto;
            max-width: 300px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        .bingo-header {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 3px;
            margin-bottom: 5px;
        }

        .bingo-letter {
            background: gold;
            color: black;
            text-align: center;
            padding: 8px 0;
            font-weight: bold;
            font-size: 1.2em;
            border-radius: 5px;
        }

        .gridCard {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 3px;
        }

        .cell {
            background: #f0f0f0;
            color: #333;
            padding: 10px 0;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.9em;
            text-align: center;
            border: 1px solid #ccc;
        }

        .cell.marked {
            background: #4CAF50;
            color: white;
        }

        .cell.free {
            background: gold;
            color: black;
            font-weight: bold;
        }

        /* Called Numbers */
        .called-numbers {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            min-height: 60px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .number-ball {
            display: inline-block;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: gold;
            color: black;
            text-align: center;
            line-height: 35px;
            font-weight: bold;
            font-size: 0.9em;
        }

        /* Countdown */
        .countdown-container {
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            border: 3px solid gold;
        }

        .countdown-timer {
            font-size: 4em;
            font-weight: bold;
            color: gold;
            animation: countdownPulse 1s infinite;
        }

        @keyframes countdownPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .info-text {
            text-align: center;
            font-size: 0.8em;
            color: rgba(255,255,255,0.7);
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎰 MK BINGO</h1>

        <!-- Balance -->
        <div class="balance-box">
            <span id="playerBalance">{{ balance|default('1000') }}</span> ETB
        </div>

        <!-- Game Status -->
        <div class="game-info">
            <div class="info-item">
                <div>Cards Sold</div>
                <div class="info-value" id="totalCardsSold">0</div>
            </div>
            <div class="info-item">
                <div>Players</div>
                <div class="info-value" id="totalPlayers">0</div>
            </div>
            <div class="info-item">
                <div>Prize</div>
                <div class="info-value" id="prizePool">0</div>
            </div>
        </div>

        <!-- SELECTION PAGE -->
        <div id="selectPage">
            <h3 style="text-align: center;">🎫 Select Cards (1-1000)</h3>
            
            <!-- Range Selector -->
            <div class="range-selector" id="rangeSelector"></div>
            
            <!-- Card Grid -->
            <div class="grid-container">
                <div id="grid"></div>
            </div>

            <div class="summary-bar">
                <span>Your Cards: <span id="selectedCount">0</span></span>
                <span>Total: <span id="totalPrice">0</span> ETB</span>
            </div>

            <div style="text-align: center;">
                <button onclick="confirmCards()" id="confirmBtn">✅ BUY CARDS</button>
                <button class="cancel-btn" onclick="cancelSelection()">❌ CLEAR ALL</button>
            </div>

            <!-- Preview Section -->
            <h3 style="text-align: center; margin-top: 15px;">📋 Selected Cards Preview</h3>
            <div class="preview-container">
                <div id="preview"></div>
            </div>
            
            <div class="info-text">
                * 10 cards total to start • 30s countdown
            </div>
        </div>

        <!-- COUNTDOWN PAGE -->
        <div id="countdownPage" style="display: none;">
            <div class="countdown-container">
                <div class="countdown-timer" id="countdownNumber">30</div>
                <div style="font-size: 1.2em;">Game Starting...</div>
                <div style="margin-top: 10px;">
                    <span id="finalCardsSold">10</span> cards • <span id="finalPlayers">0</span> players
                </div>
            </div>
        </div>

        <!-- GAME PAGE -->
        <div id="gamePage" style="display: none;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <h2 style="font-size: 1.2em;">🎯 Game In Progress</h2>
                <div class="timer" id="gameTimer">00:00</div>
            </div>

            <!-- Called Numbers -->
            <div class="called-numbers" id="numbersList"></div>

            <!-- BINGO Button -->
            <div style="text-align: center;">
                <button class="bingo-btn" onclick="callBingo()" id="bingoBtn" disabled>🔴 BINGO!</button>
            </div>

            <!-- Game Cards -->
            <div id="gameCards"></div>

            <!-- Back Button -->
            <div style="text-align: center; margin-top: 15px;">
                <button onclick="backToSelection()">🔙 BACK TO SELECTION</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== GLOBAL VARIABLES ====================
        let selectedCards = {};
        let playerBalance = {{ balance|default(1000) }};
        let userId = "{{ user_id|default('guest') }}";
        let currentGameCards = {};
        let gameSettings = {
            calledNumbers: [],
            winners: [],
            isGameActive: false,
            gameType: 'full house',
            prizeAmount: 2000,
            cardPrice: 10,
            minCardsToStart: 10
        };
        
        let gameTimer = null;
        let callInterval = null;
        let countdownInterval = null;
        let countdownValue = 30;
        let gameStarted = false;
        let bingoButtonEnabled = false;

        const API_URL = window.location.origin;

        // ==================== INIT ====================
        window.onload = function() {
            createNumberGrid();
            createRangeSelector();
            updateSummary();
        };

        // ==================== CREATE RANGE SELECTOR ====================
        function createRangeSelector() {
            let selector = document.getElementById("rangeSelector");
            let ranges = [
                {start: 1, end: 200},
                {start: 201, end: 400},
                {start: 401, end: 600},
                {start: 601, end: 800},
                {start: 801, end: 1000}
            ];
            
            ranges.forEach(range => {
                let btn = document.createElement("button");
                btn.className = "range-btn";
                btn.innerText = `${range.start}-${range.end}`;
                btn.onclick = () => scrollToRange(range.start);
                selector.appendChild(btn);
            });
        }

        function scrollToRange(start) {
            let grid = document.getElementById("grid");
            let firstCard = document.getElementById(`card-${start}`);
            if (firstCard) {
                firstCard.scrollIntoView({behavior: 'smooth', block: 'center'});
            }
        }

        // ==================== CREATE 1000 CARD GRID ====================
        function createNumberGrid() {
            let grid = document.getElementById("grid");
            grid.innerHTML = "";
            
            for (let i = 1; i <= 1000; i++) {
                let box = document.createElement("div");
                box.className = "box";
                box.innerText = i;
                box.id = `card-${i}`;

                box.onclick = () => {
                    if (gameStarted) {
                        alert("Game in progress!");
                        return;
                    }
                    
                    if (selectedCards[i]) {
                        delete selectedCards[i];
                        box.classList.remove("selected");
                    } else {
                        selectedCards[i] = generateBingoCard(i);
                        box.classList.add("selected");
                    }

                    updatePreview();
                    updateSummary();
                };

                grid.appendChild(box);
            }
        }

        // ==================== GENERATE PROPER BINGO CARD ====================
        function generateBingoCard(cardNumber) {
            let card = new Array(25).fill(0);
            let seed = cardNumber || Math.floor(Math.random() * 1000);
            
            // B column (1-15)
            let bCol = [];
            while (bCol.length < 5) {
                let n = ((seed * 1 + bCol.length * 7) % 15) + 1;
                if (!bCol.includes(n)) bCol.push(n);
            }
            
            // I column (16-30)
            let iCol = [];
            while (iCol.length < 5) {
                let n = ((seed * 2 + iCol.length * 7) % 15) + 16;
                if (!iCol.includes(n)) iCol.push(n);
            }
            
            // N column (31-45)
            let nCol = [];
            while (nCol.length < 5) {
                let n = ((seed * 3 + nCol.length * 7) % 15) + 31;
                if (!nCol.includes(n)) nCol.push(n);
            }
            
            // G column (46-60)
            let gCol = [];
            while (gCol.length < 5) {
                let n = ((seed * 4 + gCol.length * 7) % 15) + 46;
                if (!gCol.includes(n)) gCol.push(n);
            }
            
            // O column (61-75)
            let oCol = [];
            while (oCol.length < 5) {
                let n = ((seed * 5 + oCol.length * 7) % 15) + 61;
                if (!oCol.includes(n)) oCol.push(n);
            }
            
            // Fill card row by row
            for (let row = 0; row < 5; row++) {
                card[row * 5 + 0] = bCol[row];
                card[row * 5 + 1] = iCol[row];
                card[row * 5 + 2] = nCol[row];
                card[row * 5 + 3] = gCol[row];
                card[row * 5 + 4] = oCol[row];
            }
            
            // Make center cell FREE (row 2, col 2 = index 12)
            card[12] = "FREE";
            
            return card;
        }

        // ==================== UPDATE PREVIEW ====================
        function updatePreview() {
            let preview = document.getElementById("preview");
            preview.innerHTML = "";
            
            let count = 0;
            for (let cardNum in selectedCards) {
                if (count++ >= 5) break;
                
                let card = selectedCards[cardNum];
                let div = document.createElement("div");
                div.className = "preview-card";
                
                let title = document.createElement("h4");
                title.innerText = `Card #${cardNum}`;
                div.appendChild(title);
                
                let grid = document.createElement("div");
                grid.className = "preview-grid";
                
                card.forEach(num => {
                    let cell = document.createElement("div");
                    cell.className = "preview-cell";
                    if (num === "FREE") cell.classList.add("free");
                    cell.innerText = num;
                    grid.appendChild(cell);
                });
                
                div.appendChild(grid);
                preview.appendChild(div);
            }
            
            if (Object.keys(selectedCards).length > 5) {
                let more = document.createElement("div");
                more.style.textAlign = 'center';
                more.style.padding = '10px';
                more.style.color = 'gold';
                more.innerText = `+${Object.keys(selectedCards).length - 5} more cards`;
                preview.appendChild(more);
            }
        }

        // ==================== UPDATE SUMMARY ====================
        function updateSummary() {
            let count = Object.keys(selectedCards).length;
            let total = count * gameSettings.cardPrice;
            document.getElementById("selectedCount").innerText = count;
            document.getElementById("totalPrice").innerText = total;
        }

        // ==================== CONFIRM CARDS ====================
        async function confirmCards() {
            let count = Object.keys(selectedCards).length;
            let total = count * gameSettings.cardPrice;
            
            if (count === 0) {
                alert("Please select at least one card!");
                return;
            }
            
            if (count < 10) {
                alert(`❌ You need at least 10 cards to start a game!\nCurrent: ${count} cards`);
                return;
            }
            
            if (playerBalance < total) {
                alert(`Insufficient balance! Need ${total} ETB`);
                return;
            }
            
            // Update balance
            playerBalance -= total;
            document.getElementById("playerBalance").innerText = playerBalance;
            
            // Save cards for game
            currentGameCards = { ...selectedCards };
            
            alert(`✅ ${count} cards purchased!`);
            
            // Show game page immediately for testing
            // In production, you'd wait for 10 total cards
            showGamePage();
        }

        // ==================== CANCEL SELECTION ====================
        function cancelSelection() {
            if (Object.keys(selectedCards).length > 0) {
                if (confirm("Clear all selected cards?")) {
                    selectedCards = {};
                    document.querySelectorAll(".box").forEach(b => b.classList.remove("selected"));
                    updatePreview();
                    updateSummary();
                }
            }
        }

        // ==================== SHOW GAME PAGE ====================
        function showGamePage() {
            document.getElementById("selectPage").style.display = "none";
            document.getElementById("countdownPage").style.display = "none";
            document.getElementById("gamePage").style.display = "block";
            
            gameStarted = true;
            gameSettings.isGameActive = true;
            
            startTimer();
            showGameCards();
            startNumberCalls();
        }

        // ==================== SHOW GAME CARDS ====================
        function showGameCards() {
            let container = document.getElementById("gameCards");
            container.innerHTML = "";
            
            for (let cardNum in currentGameCards) {
                let card = currentGameCards[cardNum];
                let div = document.createElement("div");
                div.className = "bingo-card";

                // BINGO Header
                let header = document.createElement("div");
                header.className = "bingo-header";
                ['B', 'I', 'N', 'G', 'O'].forEach(letter => {
                    let l = document.createElement("div");
                    l.className = "bingo-letter";
                    l.innerText = letter;
                    header.appendChild(l);
                });
                div.appendChild(header);

                // 5x5 Grid
                let grid = document.createElement("div");
                grid.className = "gridCard";

                card.forEach((num, index) => {
                    let cell = document.createElement("div");
                    cell.className = "cell";
                    
                    if (num === "FREE") {
                        cell.classList.add("free");
                    } else if (gameSettings.calledNumbers.includes(num)) {
                        cell.classList.add("marked");
                    }
                    
                    cell.innerText = num;
                    grid.appendChild(cell);
                });

                div.appendChild(grid);
                
                // Card number
                let footer = document.createElement("div");
                footer.style.textAlign = 'center';
                footer.style.marginTop = '5px';
                footer.style.color = 'gold';
                footer.style.fontSize = '0.8em';
                footer.innerText = `Card #${cardNum}`;
                div.appendChild(footer);
                
                container.appendChild(div);
            }
        }

        // ==================== BACK TO SELECTION ====================
        function backToSelection() {
            if (gameTimer) clearInterval(gameTimer);
            if (callInterval) clearInterval(callInterval);
            
            document.getElementById("selectPage").style.display = "block";
            document.getElementById("countdownPage").style.display = "none";
            document.getElementById("gamePage").style.display = "none";
            
            gameStarted = false;
            gameSettings.isGameActive = false;
            gameSettings.calledNumbers = [];
            gameSettings.winners = [];
            document.getElementById('numbersList').innerHTML = '';
        }

        // ==================== START NUMBER CALLS ====================
        function startNumberCalls() {
            gameSettings.calledNumbers = [];
            
            callInterval = setInterval(() => {
                if (!gameSettings.isGameActive) return;
                
                let num = Math.floor(Math.random() * 75) + 1;
                if (!gameSettings.calledNumbers.includes(num)) {
                    gameSettings.calledNumbers.push(num);
                    
                    // Add to display
                    let list = document.getElementById('numbersList');
                    let ball = document.createElement('span');
                    ball.className = 'number-ball';
                    ball.innerText = num;
                    list.appendChild(ball);
                    
                    // Update cards
                    showGameCards();
                    
                    // Enable Bingo button
                    document.getElementById('bingoBtn').disabled = false;
                    bingoButtonEnabled = true;
                }
            }, 3000);
        }

        // ==================== CALL BINGO ====================
        function callBingo() {
            if (!bingoButtonEnabled) {
                alert("Wait for numbers to be called!");
                return;
            }
            
            // Check for win (full house)
            let allMarked = true;
            for (let cardNum in currentGameCards) {
                let card = currentGameCards[cardNum];
                for (let i = 0; i < card.length; i++) {
                    if (card[i] !== "FREE" && !gameSettings.calledNumbers.includes(card[i])) {
                        allMarked = false;
                        break;
                    }
                }
                if (!allMarked) break;
            }
            
            if (allMarked) {
                alert("🎉 BINGO! YOU WIN! 🎉");
                document.getElementById('bingoBtn').disabled = true;
                bingoButtonEnabled = false;
                gameSettings.isGameActive = false;
                clearInterval(callInterval);
            } else {
                alert("❌ FALSE BINGO! You're out!");
                currentGameCards = {};
                showGameCards();
                document.getElementById('bingoBtn').disabled = true;
                bingoButtonEnabled = false;
            }
        }

        // ==================== TIMER ====================
        function startTimer() {
            let seconds = 0;
            gameTimer = setInterval(() => {
                seconds++;
                let mins = Math.floor(seconds / 60);
                let secs = seconds % 60;
                document.getElementById('gameTimer').innerText = 
                    `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            }, 1000);
        }
    </script>
</body>
</html>
