<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MK BINGO - Card Selection</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            color: white;
            padding: 10px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,215,0,0.3);
        }

        h1 {
            text-align: center;
            font-size: 1.8em;
            margin-bottom: 10px;
            color: gold;
        }

        /* Balance Box */
        .balance-box {
            background: rgba(0,0,0,0.5);
            padding: 8px 15px;
            border-radius: 30px;
            max-width: 180px;
            margin: 10px auto;
            border: 2px solid gold;
            text-align: center;
        }

        .balance-box span {
            font-size: 1.3em;
            font-weight: bold;
            color: gold;
        }

        /* Game Status */
        .game-status {
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
            border: 2px solid gold;
            text-align: center;
        }

        /* Card Selection Grid */
        .selection-info {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 2px;
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin: 10px 0;
        }

        .box {
            background: white;
            color: black;
            padding: 5px 0;
            font-size: 0.7em;
            text-align: center;
            cursor: pointer;
            border-radius: 3px;
            border: 2px solid transparent;
            transition: all 0.2s;
            position: relative;
        }

        .box.available {
            background: white;
            color: black;
            border-color: #4CAF50;
        }

        .box.available:hover {
            transform: scale(1.1);
            background: #4CAF50;
            color: white;
        }

        .box.selected {
            background: #4CAF50;
            color: white;
            border-color: gold;
        }

        /* PURCHASED CARDS - DISABLED */
        .box.purchased {
            background: #cccccc;
            color: #666666;
            cursor: not-allowed;
            border-color: #f44336;
            opacity: 0.7;
            position: relative;
        }

        .box.purchased::after {
            content: "❌";
            position: absolute;
            top: -5px;
            right: -5px;
            font-size: 0.6em;
            background: #f44336;
            color: white;
            border-radius: 50%;
            width: 15px;
            height: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .box.purchased:hover {
            transform: none;
            background: #cccccc;
        }

        .box.own-purchased {
            background: #4CAF50;
            color: white;
            border-color: gold;
            cursor: default;
            opacity: 1;
        }

        .box.own-purchased::after {
            content: "✓";
            position: absolute;
            top: -5px;
            right: -5px;
            font-size: 0.6em;
            background: gold;
            color: black;
            border-radius: 50%;
            width: 15px;
            height: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Legend */
        .legend {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 10px 0;
            font-size: 0.8em;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 3px;
        }

        .color-available {
            background: white;
            border: 2px solid #4CAF50;
        }

        .color-purchased {
            background: #cccccc;
            border: 2px solid #f44336;
        }

        .color-mine {
            background: #4CAF50;
            border: 2px solid gold;
        }

        /* Message */
        .message-box {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #f44336;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            border: 2px solid gold;
            z-index: 1000;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { top: -100px; }
            to { top: 20px; }
        }

        /* Buttons */
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            background: #4CAF50;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
        }

        .cancel-btn {
            background: #f44336;
        }

        .back-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid gold;
            width: 100%;
            padding: 12px;
            margin-top: 10px;
        }

        /* Summary Bar */
        .summary-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 20px;
            margin: 10px 0;
        }

        /* Page visibility */
        #selectPage, #waitingPage, #countdownPage, #gamePage {
            display: none;
        }

        #selectPage.active, #waitingPage.active, #countdownPage.active, #gamePage.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎰 MK BINGO</h1>

        <!-- Balance -->
        <div class="balance-box">
            <span id="playerBalance">{{ balance|default('1000') }}</span> ETB
        </div>

        <!-- SELECTION PAGE -->
        <div id="selectPage" class="active">
            <h3 style="text-align: center;">🎫 Select Cards (1-1000)</h3>
            
            <!-- Legend -->
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color color-available"></div>
                    <span>Available</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color color-purchased"></div>
                    <span>Sold</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color color-mine"></div>
                    <span>My Cards</span>
                </div>
            </div>
            
            <!-- Range Selector -->
            <div style="display: flex; gap: 3px; flex-wrap: wrap; justify-content: center; margin: 5px 0;" id="rangeSelector"></div>
            
            <!-- Card Grid -->
            <div id="grid"></div>

            <div class="summary-bar">
                <span>Your Cards: <span id="selectedCount">0</span></span>
                <span>Total: <span id="totalPrice">0</span> ETB</span>
            </div>

            <div style="text-align: center;">
                <button onclick="confirmCards()" id="confirmBtn" disabled>✅ BUY CARDS</button>
                <button class="cancel-btn" onclick="cancelSelection()">❌ CLEAR</button>
            </div>
            
            <div class="footer-info" style="text-align:center; font-size:0.8em; margin-top:10px;">
                * Each card can only be bought once • Green = Available • Red = Sold
            </div>
        </div>

        <!-- Message Container -->
        <div id="messageContainer"></div>
    </div>

    <script>
        // ==================== GLOBAL VARIABLES ====================
        let selectedCards = {};
        let playerBalance = {{ balance|default(1000) }};
        let userId = "{{ user_id|default('guest') }}";
        
        // TRACK PURCHASED CARDS GLOBALLY
        let purchasedCards = new Set();  // Card numbers that are already bought by anyone
        
        // Track current user's purchased cards
        let myPurchasedCards = new Set();
        
        let gameSettings = {
            cardPrice: 10
        };

        // ==================== INIT ====================
        window.onload = function() {
            createNumberGrid();
            createRangeSelector();
            updateSummary();
            loadPurchasedCards(); // Simulate loading purchased cards from server
        };

        // ==================== SIMULATE LOADING PURCHASED CARDS ====================
        function loadPurchasedCards() {
            // In real app, this would fetch from server
            // For demo, randomly mark some cards as purchased
            for (let i = 1; i <= 1000; i++) {
                if (Math.random() < 0.1) { // 10% of cards are already purchased
                    purchasedCards.add(i);
                }
            }
            updateGridDisplay();
        }

        // ==================== CREATE RANGE SELECTOR ====================
        function createRangeSelector() {
            let selector = document.getElementById("rangeSelector");
            let ranges = [
                {start: 1, end: 200}, {start: 201, end: 400}, {start: 401, end: 600},
                {start: 601, end: 800}, {start: 801, end: 1000}
            ];
            
            ranges.forEach(range => {
                let btn = document.createElement("button");
                btn.style.padding = '5px 8px';
                btn.style.fontSize = '0.7em';
                btn.style.background = 'rgba(255,215,0,0.2)';
                btn.style.border = '1px solid gold';
                btn.style.borderRadius = '12px';
                btn.style.color = 'white';
                btn.style.cursor = 'pointer';
                btn.innerText = `${range.start}-${range.end}`;
                btn.onclick = () => scrollToRange(range.start);
                selector.appendChild(btn);
            });
        }

        function scrollToRange(start) {
            let grid = document.getElementById("grid");
            let firstCard = document.getElementById(`card-${start}`);
            if (firstCard) firstCard.scrollIntoView({behavior: 'smooth', block: 'center'});
        }

        // ==================== CREATE CARD GRID ====================
        function createNumberGrid() {
            let grid = document.getElementById("grid");
            grid.innerHTML = "";
            
            for (let i = 1; i <= 1000; i++) {
                let box = document.createElement("div");
                box.className = "box available";
                box.innerText = i;
                box.id = `card-${i}`;

                box.onclick = () => handleCardClick(i, box);
                
                grid.appendChild(box);
            }
            
            updateGridDisplay();
        }

        // ==================== HANDLE CARD CLICK ====================
        function handleCardClick(cardNumber, box) {
            // Check if card is already purchased by someone else
            if (purchasedCards.has(cardNumber) && !myPurchasedCards.has(cardNumber)) {
                showMessage(`❌ Card #${cardNumber} is already purchased by another player!`);
                return;
            }
            
            // If it's my purchased card, can't select again
            if (myPurchasedCards.has(cardNumber)) {
                showMessage(`ℹ️ Card #${cardNumber} is already in your collection`);
                return;
            }
            
            // Toggle selection
            if (selectedCards[cardNumber]) {
                delete selectedCards[cardNumber];
                if (!purchasedCards.has(cardNumber)) {
                    box.className = "box available";
                }
            } else {
                // Check if trying to select more than balance allows
                let total = (Object.keys(selectedCards).length + 1) * gameSettings.cardPrice;
                if (total > playerBalance) {
                    showMessage(`❌ Insufficient balance! Need ${total} ETB`);
                    return;
                }
                
                selectedCards[cardNumber] = true;
                box.className = "box selected";
            }
            
            updateSummary();
            updateConfirmButton();
        }

        // ==================== UPDATE GRID DISPLAY ====================
        function updateGridDisplay() {
            for (let i = 1; i <= 1000; i++) {
                let box = document.getElementById(`card-${i}`);
                if (!box) continue;
                
                if (myPurchasedCards.has(i)) {
                    box.className = "box own-purchased";
                } else if (purchasedCards.has(i)) {
                    box.className = "box purchased";
                } else if (selectedCards[i]) {
                    box.className = "box selected";
                } else {
                    box.className = "box available";
                }
            }
        }

        // ==================== SHOW MESSAGE ====================
        function showMessage(text) {
            let container = document.getElementById('messageContainer');
            let msg = document.createElement('div');
            msg.className = 'message-box';
            msg.innerText = text;
            container.appendChild(msg);
            
            setTimeout(() => {
                msg.remove();
            }, 3000);
        }

        // ==================== UPDATE SUMMARY ====================
        function updateSummary() {
            let count = Object.keys(selectedCards).length;
            let total = count * gameSettings.cardPrice;
            document.getElementById("selectedCount").innerText = count;
            document.getElementById("totalPrice").innerText = total;
        }

        // ==================== UPDATE CONFIRM BUTTON ====================
        function updateConfirmButton() {
            let count = Object.keys(selectedCards).length;
            let btn = document.getElementById('confirmBtn');
            btn.disabled = count === 0;
        }

        // ==================== CONFIRM CARDS ====================
        async function confirmCards() {
            let count = Object.keys(selectedCards).length;
            let total = count * gameSettings.cardPrice;
            
            if (count === 0) {
                showMessage("Please select at least 1 card!");
                return;
            }
            
            // Double-check purchased status
            for (let cardNum in selectedCards) {
                if (purchasedCards.has(parseInt(cardNum))) {
                    showMessage(`❌ Card #${cardNum} was just purchased by someone else!`);
                    delete selectedCards[cardNum];
                    updateGridDisplay();
                    updateSummary();
                    return;
                }
            }
            
            if (playerBalance < total) {
                showMessage(`❌ Insufficient balance! Need ${total} ETB`);
                return;
            }
            
            // Deduct balance
            playerBalance -= total;
            document.getElementById("playerBalance").innerText = playerBalance;
            
            // Mark cards as purchased
            for (let cardNum in selectedCards) {
                let num = parseInt(cardNum);
                purchasedCards.add(num);
                myPurchasedCards.add(num);
            }
            
            // Clear selection
            selectedCards = {};
            updateGridDisplay();
            updateSummary();
            updateConfirmButton();
            
            showMessage(`✅ Successfully purchased ${count} cards!`);
            
            // Send to server (in real app)
            try {
                await fetch(`${API_URL}/api/game/purchase`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: userId,
                        cards_bought: Array.from(myPurchasedCards)
                    })
                });
            } catch (e) {}
        }

        function cancelSelection() {
            if (Object.keys(selectedCards).length > 0 && confirm("Clear all selections?")) {
                selectedCards = {};
                updateGridDisplay();
                updateSummary();
                updateConfirmButton();
            }
        }

        // ==================== SIMULATE OTHER PLAYERS BUYING (for testing) ====================
        function simulateOtherPlayerPurchase() {
            // This simulates another player buying a random card
            // In real app, this would come from server via WebSocket
            setInterval(() => {
                let randomCard = Math.floor(Math.random() * 1000) + 1;
                if (!purchasedCards.has(randomCard) && !selectedCards[randomCard]) {
                    purchasedCards.add(randomCard);
                    updateGridDisplay();
                    showMessage(`👤 Another player bought card #${randomCard}`);
                }
            }, 10000);
        }

        // Uncomment to test real-time updates
        // simulateOtherPlayerPurchase();
    </script>
</body>
</html>
