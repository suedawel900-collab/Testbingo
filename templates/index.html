<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MK BINGO - Card Selection</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            color: white;
            padding: 10px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,215,0,0.3);
        }

        h1 {
            text-align: center;
            font-size: 1.8em;
            margin-bottom: 10px;
            color: gold;
        }

        /* Balance Box */
        .balance-box {
            background: rgba(0,0,0,0.5);
            padding: 8px 15px;
            border-radius: 30px;
            max-width: 180px;
            margin: 10px auto;
            border: 2px solid gold;
            text-align: center;
        }

        .balance-box span {
            font-size: 1.3em;
            font-weight: bold;
            color: gold;
        }

        /* Range Selector */
        .range-selector {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 15px 0;
        }

        .range-btn {
            padding: 8px 12px;
            font-size: 0.8em;
            background: rgba(255,215,0,0.2);
            border: 1px solid gold;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .range-btn:hover {
            background: gold;
            color: black;
        }

        /* ===== CARD GRID - 1000 CARDS ===== */
        .grid-container {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 10px;
            margin: 10px 0;
            max-height: 300px;
            overflow-y: auto;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 2px;
        }

        /* CARD STATES - VISUALLY DISTINCT */
        .box {
            padding: 5px 0;
            font-size: 0.65em;
            text-align: center;
            border-radius: 3px;
            font-weight: bold;
            transition: all 0.2s;
            position: relative;
        }

        /* AVAILABLE - Can be bought */
        .box.available {
            background: white;
            color: black;
            border: 2px solid #4CAF50;
            cursor: pointer;
        }

        .box.available:hover {
            background: #4CAF50;
            color: white;
            transform: scale(1.1);
            z-index: 10;
        }

        /* SELECTED - In your cart */
        .box.selected {
            background: #4CAF50;
            color: white;
            border: 2px solid gold;
            cursor: pointer;
        }

        /* PURCHASED BY OTHERS - CANNOT BUY */
        .box.purchased {
            background: #cccccc;
            color: #666666;
            border: 2px solid #f44336;
            cursor: not-allowed;
            opacity: 0.7;
            position: relative;
        }

        .box.purchased::after {
            content: "❌";
            position: absolute;
            top: -5px;
            right: -5px;
            font-size: 10px;
            background: #f44336;
            color: white;
            border-radius: 50%;
            width: 15px;
            height: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* YOUR OWN PURCHASED CARDS */
        .box.own-purchased {
            background: #4CAF50;
            color: white;
            border: 2px solid gold;
            cursor: default;
            opacity: 1;
            position: relative;
        }

        .box.own-purchased::after {
            content: "✓";
            position: absolute;
            top: -5px;
            right: -5px;
            font-size: 10px;
            background: gold;
            color: black;
            border-radius: 50%;
            width: 15px;
            height: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Legend */
        .legend {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 10px 0;
            font-size: 0.8em;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 3px;
        }

        .color-available {
            background: white;
            border: 2px solid #4CAF50;
        }

        .color-selected {
            background: #4CAF50;
            border: 2px solid gold;
        }

        .color-purchased {
            background: #cccccc;
            border: 2px solid #f44336;
            position: relative;
        }

        .color-purchased::after {
            content: "❌";
            position: absolute;
            top: -5px;
            right: -5px;
            font-size: 8px;
        }

        .color-mine {
            background: #4CAF50;
            border: 2px solid gold;
            position: relative;
        }

        .color-mine::after {
            content: "✓";
            position: absolute;
            top: -5px;
            right: -5px;
            font-size: 8px;
            color: black;
        }

        /* Summary Bar */
        .summary-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            padding: 10px 15px;
            border-radius: 30px;
            margin: 10px 0;
            font-size: 1em;
            font-weight: bold;
        }

        .summary-bar span {
            color: gold;
        }

        /* Preview Section */
        .preview-section {
            margin: 20px 0;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            border: 2px solid gold;
        }

        .preview-title {
            color: gold;
            font-size: 1.1em;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .preview-count {
            background: gold;
            color: black;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .preview-container {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 10px 5px;
            min-height: 200px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }

        .preview-card {
            background: white;
            border-radius: 10px;
            padding: 10px;
            min-width: 180px;
            border: 2px solid gold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .preview-card .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9em;
        }

        .preview-card .card-number {
            color: gold;
            font-weight: bold;
        }

        .preview-card .bingo-header {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px;
            margin-bottom: 2px;
        }

        .preview-card .bingo-letter {
            background: gold;
            color: black;
            text-align: center;
            padding: 3px;
            font-size: 0.8em;
            font-weight: bold;
            border-radius: 3px;
        }

        .preview-card .gridCard {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px;
        }

        .preview-card .cell {
            background: #f0f0f0;
            color: #333;
            text-align: center;
            padding: 5px 0;
            font-size: 0.7em;
            font-weight: bold;
            border-radius: 3px;
        }

        .preview-card .cell.free {
            background: gold;
            color: black;
        }

        .empty-preview {
            color: rgba(255,255,255,0.5);
            text-align: center;
            width: 100%;
            padding: 40px;
            font-style: italic;
        }

        /* Buttons */
        button {
            padding: 12px 25px;
            font-size: 1em;
            border: none;
            border-radius: 30px;
            background: #4CAF50;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            transition: all 0.2s;
        }

        button:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 0 15px #4CAF50;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .cancel-btn {
            background: #f44336;
        }

        .cancel-btn:hover:not(:disabled) {
            box-shadow: 0 0 15px #f44336;
        }

        /* Message Box */
        .message-box {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #f44336;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            border: 2px solid gold;
            z-index: 1000;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { top: -100px; }
            to { top: 20px; }
        }

        /* Footer */
        .footer-info {
            text-align: center;
            font-size: 0.8em;
            color: rgba(255,255,255,0.7);
            margin-top: 15px;
        }

        /* Page visibility */
        #selectPage, #waitingPage, #countdownPage, #gamePage {
            display: none;
        }

        #selectPage.active, #waitingPage.active, #countdownPage.active, #gamePage.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎰 MK BINGO</h1>

        <!-- Balance -->
        <div class="balance-box">
            <span id="playerBalance">{{ balance|default('1000') }}</span> ETB
        </div>

        <!-- SELECTION PAGE -->
        <div id="selectPage" class="active">
            <h3 style="text-align: center;">🎫 Select Cards (1-1000)</h3>
            
            <!-- Legend - Shows what each color means -->
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color color-available"></div>
                    <span>Available</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color color-selected"></div>
                    <span>Selected</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color color-purchased"></div>
                    <span>Sold</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color color-mine"></div>
                    <span>My Cards</span>
                </div>
            </div>
            
            <!-- Range Selector -->
            <div class="range-selector" id="rangeSelector"></div>
            
            <!-- 1000 Card Grid -->
            <div class="grid-container">
                <div id="grid"></div>
            </div>

            <div class="summary-bar">
                <span>Your Cards: <span id="selectedCount">0</span></span>
                <span>Total: <span id="totalPrice">0</span> ETB</span>
            </div>

            <!-- Card Preview Section -->
            <div class="preview-section">
                <div class="preview-title">
                    <span>📋 Selected Cards Preview</span>
                    <span class="preview-count" id="previewCount">0</span>
                </div>
                <div class="preview-container" id="previewContainer">
                    <div class="empty-preview">Click on cards above to preview them here</div>
                </div>
            </div>

            <div style="text-align: center;">
                <button onclick="confirmCards()" id="confirmBtn" disabled>✅ BUY CARDS & JOIN</button>
                <button class="cancel-btn" onclick="cancelSelection()">❌ CLEAR</button>
            </div>
            
            <div class="footer-info">
                * Cards are locked once purchased • Green = Available • Red = Sold
            </div>
        </div>

        <!-- Message Container -->
        <div id="messageContainer"></div>
    </div>

    <script>
        // ==================== GLOBAL VARIABLES ====================
        let selectedCards = {};  // Cards currently selected (not yet purchased)
        let playerBalance = {{ balance|default(1000) }};
        let userId = "{{ user_id|default('guest') }}";
        
        // TRACK PURCHASED CARDS - These are LOCKED for others
        let purchasedCards = new Set();  // Cards already bought by ANYONE (locked)
        let myPurchasedCards = new Set(); // Cards bought by current user (my locked cards)
        
        let gameSettings = {
            cardPrice: 10
        };

        const API_URL = window.location.origin;

        // ==================== INIT ====================
        window.onload = function() {
            createNumberGrid();      // Create 1000 cards
            createRangeSelector();   // Create navigation buttons
            updateSummary();         // Update selected count
            updatePreview();         // Initialize preview
            loadPurchasedCards();    // Load purchased cards from server
        };

        // ==================== LOAD PURCHASED CARDS ====================
        async function loadPurchasedCards() {
            try {
                let response = await fetch(`${API_URL}/api/cards/status?user_id=${userId}`);
                let data = await response.json();
                
                if (data.success) {
                    // Mark all purchased cards (these are LOCKED)
                    purchasedCards = new Set(data.purchased || []);
                    
                    // Mark user's own cards
                    myPurchasedCards = new Set(data.my_cards || []);
                    
                    updateGridDisplay();
                }
            } catch (e) {
                console.log('Using demo data');
                // Demo data - mark some cards as purchased/locked
                for (let i = 1; i <= 1000; i++) {
                    if (i % 7 === 0) { // Every 7th card is locked (bought by others)
                        purchasedCards.add(i);
                    }
                }
                // Mark some as user's own locked cards
                for (let i = 1; i <= 1000; i++) {
                    if (i % 13 === 0) {
                        myPurchasedCards.add(i);
                        purchasedCards.add(i);
                    }
                }
                updateGridDisplay();
            }
        }

        // ==================== CREATE RANGE SELECTOR ====================
        function createRangeSelector() {
            let selector = document.getElementById("rangeSelector");
            let ranges = [
                {start: 1, end: 200}, {start: 201, end: 400}, {start: 401, end: 600},
                {start: 601, end: 800}, {start: 801, end: 1000}
            ];
            
            ranges.forEach(range => {
                let btn = document.createElement("button");
                btn.className = 'range-btn';
                btn.innerText = `${range.start}-${range.end}`;
                btn.onclick = () => scrollToRange(range.start);
                selector.appendChild(btn);
            });
        }

        function scrollToRange(start) {
            let grid = document.getElementById("grid");
            let firstCard = document.getElementById(`card-${start}`);
            if (firstCard) firstCard.scrollIntoView({behavior: 'smooth', block: 'center'});
        }

        // ==================== CREATE 1000 CARD GRID ====================
        function createNumberGrid() {
            let grid = document.getElementById("grid");
            grid.innerHTML = "";
            
            for (let i = 1; i <= 1000; i++) {
                let box = document.createElement("div");
                box.className = "box available";
                box.innerText = i;
                box.id = `card-${i}`;
                
                box.onclick = () => handleCardClick(i, box);
                grid.appendChild(box);
            }
        }

        // ==================== HANDLE CARD CLICK ====================
        function handleCardClick(cardNumber, box) {
            // CHECK 1: Is card already purchased by someone else? (LOCKED)
            if (purchasedCards.has(cardNumber) && !myPurchasedCards.has(cardNumber)) {
                showMessage(`❌ Card #${cardNumber} is already purchased and LOCKED!`);
                return;
            }
            
            // CHECK 2: Is this my own purchased card? (already locked for me)
            if (myPurchasedCards.has(cardNumber)) {
                showMessage(`ℹ️ Card #${cardNumber} is already in your collection`);
                return;
            }
            
            // CHECK 3: Is card already in cart?
            if (selectedCards[cardNumber]) {
                // Remove from cart
                delete selectedCards[cardNumber];
                box.className = "box available";
            } else {
                // Check balance before adding
                let total = (Object.keys(selectedCards).length + 1) * gameSettings.cardPrice;
                if (total > playerBalance) {
                    showMessage(`❌ Insufficient balance! Need ${total} ETB`);
                    return;
                }
                // Add to cart
                selectedCards[cardNumber] = true;
                box.className = "box selected";
            }
            
            updateSummary();
            updatePreview();
            updateConfirmButton();
        }

        // ==================== UPDATE GRID DISPLAY ====================
        function updateGridDisplay() {
            for (let i = 1; i <= 1000; i++) {
                let box = document.getElementById(`card-${i}`);
                if (!box) continue;
                
                // Priority 1: User's own purchased cards (locked for user)
                if (myPurchasedCards.has(i)) {
                    box.className = "box own-purchased";
                }
                // Priority 2: Cards purchased by others (LOCKED for everyone else)
                else if (purchasedCards.has(i)) {
                    box.className = "box purchased";
                }
                // Priority 3: Cards in current cart
                else if (selectedCards[i]) {
                    box.className = "box selected";
                }
                // Priority 4: Available cards
                else {
                    box.className = "box available";
                }
            }
        }

        // ==================== UPDATE PREVIEW ====================
        function updatePreview() {
            let container = document.getElementById('previewContainer');
            let previewCount = document.getElementById('previewCount');
            
            let selectedArray = Object.keys(selectedCards).map(Number);
            previewCount.innerText = selectedArray.length;
            
            if (selectedArray.length === 0) {
                container.innerHTML = '<div class="empty-preview">Click on cards above to preview them here</div>';
                return;
            }
            
            container.innerHTML = '';
            
            // Show up to 5 preview cards
            selectedArray.slice(0, 5).forEach(cardNum => {
                let card = generateBingoCard(cardNum);
                let previewDiv = document.createElement('div');
                previewDiv.className = 'preview-card';
                
                // Card Header
                let header = document.createElement('div');
                header.className = 'card-header';
                header.innerHTML = `
                    <span class="card-number">#${cardNum}</span>
                    <span style="color:#4CAF50;">✓</span>
                `;
                previewDiv.appendChild(header);
                
                // BINGO Header
                let bingoHeader = document.createElement('div');
                bingoHeader.className = 'bingo-header';
                ['B','I','N','G','O'].forEach(letter => {
                    let l = document.createElement('div');
                    l.className = 'bingo-letter';
                    l.innerText = letter;
                    bingoHeader.appendChild(l);
                });
                previewDiv.appendChild(bingoHeader);
                
                // Grid
                let grid = document.createElement('div');
                grid.className = 'gridCard';
                
                card.forEach(num => {
                    let cell = document.createElement('div');
                    cell.className = 'cell';
                    if (num === "FREE") cell.classList.add('free');
                    cell.innerText = num;
                    grid.appendChild(cell);
                });
                
                previewDiv.appendChild(grid);
                container.appendChild(previewDiv);
            });
            
            // Show count if more than 5
            if (selectedArray.length > 5) {
                let more = document.createElement('div');
                more.style.cssText = 'display: flex; align-items: center; justify-content: center; padding: 0 10px; color: gold;';
                more.innerText = `+${selectedArray.length - 5} more`;
                container.appendChild(more);
            }
        }

        // ==================== GENERATE BINGO CARD ====================
        function generateBingoCard(cardNumber) {
            let card = new Array(25).fill(0);
            let seed = cardNumber || Math.floor(Math.random() * 1000);
            
            let bCol = []; while (bCol.length < 5) { let n = ((seed * 1 + bCol.length * 7) % 15) + 1; if (!bCol.includes(n)) bCol.push(n); }
            let iCol = []; while (iCol.length < 5) { let n = ((seed * 2 + iCol.length * 7) % 15) + 16; if (!iCol.includes(n)) iCol.push(n); }
            let nCol = []; while (nCol.length < 5) { let n = ((seed * 3 + nCol.length * 7) % 15) + 31; if (!nCol.includes(n)) nCol.push(n); }
            let gCol = []; while (gCol.length < 5) { let n = ((seed * 4 + gCol.length * 7) % 15) + 46; if (!gCol.includes(n)) gCol.push(n); }
            let oCol = []; while (oCol.length < 5) { let n = ((seed * 5 + oCol.length * 7) % 15) + 61; if (!oCol.includes(n)) oCol.push(n); }
            
            for (let row = 0; row < 5; row++) {
                card[row * 5 + 0] = bCol[row];
                card[row * 5 + 1] = iCol[row];
                card[row * 5 + 2] = nCol[row];
                card[row * 5 + 3] = gCol[row];
                card[row * 5 + 4] = oCol[row];
            }
            card[12] = "FREE";
            return card;
        }

        // ==================== SHOW MESSAGE ====================
        function showMessage(text) {
            let container = document.getElementById('messageContainer');
            let msg = document.createElement('div');
            msg.className = 'message-box';
            msg.innerText = text;
            container.appendChild(msg);
            
            setTimeout(() => {
                msg.remove();
            }, 3000);
        }

        // ==================== UPDATE SUMMARY ====================
        function updateSummary() {
            let count = Object.keys(selectedCards).length;
            let total = count * gameSettings.cardPrice;
            document.getElementById("selectedCount").innerText = count;
            document.getElementById("totalPrice").innerText = total;
        }

        // ==================== UPDATE CONFIRM BUTTON ====================
        function updateConfirmButton() {
            let count = Object.keys(selectedCards).length;
            document.getElementById("confirmBtn").disabled = count === 0;
        }

        // ==================== CONFIRM CARDS ====================
        async function confirmCards() {
            let count = Object.keys(selectedCards).length;
            let total = count * gameSettings.cardPrice;
            
            if (count === 0) {
                showMessage("Please select at least 1 card!");
                return;
            }
            
            // DOUBLE-CHECK: Make sure no cards were purchased while selecting
            let conflicts = [];
            for (let cardNum in selectedCards) {
                if (purchasedCards.has(parseInt(cardNum)) && !myPurchasedCards.has(parseInt(cardNum))) {
                    conflicts.push(cardNum);
                }
            }
            
            if (conflicts.length > 0) {
                showMessage(`❌ Cards ${conflicts.join(', ')} were just purchased and LOCKED by others!`);
                // Remove conflicts from selection
                conflicts.forEach(cardNum => {
                    delete selectedCards[cardNum];
                    let box = document.getElementById(`card-${cardNum}`);
                    if (box) box.className = "box purchased";
                });
                updateSummary();
                updatePreview();
                return;
            }
            
            if (playerBalance < total) {
                showMessage(`❌ Insufficient balance! Need ${total} ETB`);
                return;
            }
            
            // Deduct balance
            playerBalance -= total;
            document.getElementById("playerBalance").innerText = playerBalance;
            
            // Mark cards as purchased (LOCK them for others)
            for (let cardNum in selectedCards) {
                let num = parseInt(cardNum);
                purchasedCards.add(num);
                myPurchasedCards.add(num);
            }
            
            // Clear selection
            selectedCards = {};
            updateGridDisplay();
            updateSummary();
            updatePreview();
            updateConfirmButton();
            
            showMessage(`✅ Successfully purchased ${count} cards! They are now LOCKED for others`);
            
            // Send to server
            try {
                await fetch(`${API_URL}/api/cards/purchase`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: userId,
                        cards: Array.from(myPurchasedCards),
                        total_price: total
                    })
                });
            } catch (e) {}
        }

        function cancelSelection() {
            if (Object.keys(selectedCards).length > 0 && confirm("Clear all selections?")) {
                selectedCards = {};
                updateGridDisplay();
                updateSummary();
                updatePreview();
                updateConfirmButton();
            }
        }

        // ==================== SIMULATE OTHER PLAYERS BUYING ====================
        function simulateOtherPlayerPurchase() {
            setInterval(() => {
                let randomCard = Math.floor(Math.random() * 1000) + 1;
                if (!purchasedCards.has(randomCard) && !selectedCards[randomCard]) {
                    purchasedCards.add(randomCard);
                    updateGridDisplay();
                    showMessage(`👤 Another player bought and LOCKED card #${randomCard}`);
                }
            }, 15000);
        }

        // Uncomment to test real-time updates
        // simulateOtherPlayerPurchase();
    </script>
</body>
</html>
