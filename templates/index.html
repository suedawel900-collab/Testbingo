<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK BINGO</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 10px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 20px;
        }
        h1 { text-align: center; color: gold; }
        .balance {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 30px;
            max-width: 200px;
            margin: 10px auto;
            text-align: center;
            border: 2px solid gold;
        }
        .balance span { color: gold; font-size: 1.5em; font-weight: bold; }
        #grid {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 2px;
            max-height: 300px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
        }
        .box {
            background: white;
            color: black;
            padding: 5px 0;
            font-size: 0.6em;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 3px;
        }
        .box.available { background: white; border-color: #4CAF50; }
        .box.selected { background: #4CAF50; color: white; border-color: gold; }
        .box.purchased { 
            background: #ccc; 
            color: #666; 
            border-color: #f44336; 
            cursor: not-allowed;
            position: relative;
        }
        .box.purchased::after {
            content: "❌";
            position: absolute;
            top: -5px;
            right: -5px;
            font-size: 8px;
            background: #f44336;
            color: white;
            border-radius: 50%;
            width: 12px;
            height: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .box.own-purchased {
            background: #4CAF50;
            color: white;
            border-color: gold;
            cursor: default;
        }
        .summary-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 20px;
            margin: 10px 0;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            background: #4CAF50;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
        }
        .cancel-btn { background: #f44336; }
        #message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #f44336;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            border: 2px solid gold;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎰 MK BINGO</h1>
        
        <div class="balance">
            <span id="playerBalance">{{ balance|default('1000') }}</span> ETB
        </div>

        <div id="selectPage">
            <h3 style="text-align: center;">Select Cards (1-1000)</h3>
            
            <div style="display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; margin: 10px 0;" id="rangeSelector"></div>
            
            <div id="grid"></div>

            <div class="summary-bar">
                <span>Your Cards: <span id="selectedCount">0</span></span>
                <span>Total: <span id="totalPrice">0</span> ETB</span>
            </div>

            <div style="text-align: center;">
                <button onclick="confirmCards()" id="confirmBtn" disabled>✅ BUY CARDS</button>
                <button class="cancel-btn" onclick="cancelSelection()">❌ CLEAR</button>
            </div>
        </div>

        <div id="waitingPage" style="display: none;">
            <div style="text-align: center; padding: 30px;">
                <h2 style="color: gold;">⏳ WAITING FOR PLAYERS</h2>
                <div style="font-size: 2em;" id="waitingCards">0/10 Cards</div>
                <div id="waitingPlayers"></div>
                <button onclick="leaveGame()" style="margin-top: 20px;">🔙 LEAVE</button>
            </div>
        </div>

        <div id="gamePage" style="display: none;">
            <div style="text-align: center;">
                <h2>🎯 GAME STARTED!</h2>
                <div id="gameCards"></div>
            </div>
        </div>
    </div>

    <div id="message"></div>

    <script>
        let selectedCards = {};
        let playerBalance = {{ balance|default(1000) }};
        let userId = "{{ user_id|default('guest') }}";
        let purchasedCards = new Set();
        let myCards = new Set();
        let currentSession = null;
        
        const API_URL = window.location.origin;

        window.onload = function() {
            createGrid();
            createRangeSelector();
            loadCardStatus();
        };

        function createRangeSelector() {
            let selector = document.getElementById('rangeSelector');
            let ranges = [[1,200], [201,400], [401,600], [601,800], [801,1000]];
            ranges.forEach(r => {
                let btn = document.createElement('button');
                btn.style.padding = '5px 10px';
                btn.style.background = 'rgba(255,215,0,0.2)';
                btn.style.border = '1px solid gold';
                btn.style.borderRadius = '15px';
                btn.style.color = 'white';
                btn.innerText = r[0] + '-' + r[1];
                btn.onclick = () => document.getElementById(`card-${r[0]}`).scrollIntoView();
                selector.appendChild(btn);
            });
        }

        function createGrid() {
            let grid = document.getElementById('grid');
            for (let i = 1; i <= 1000; i++) {
                let box = document.createElement('div');
                box.className = 'box available';
                box.id = `card-${i}`;
                box.innerText = i;
                box.onclick = () => handleCardClick(i, box);
                grid.appendChild(box);
            }
        }

        async function loadCardStatus() {
            try {
                let res = await fetch(`${API_URL}/api/cards/status?user_id=${userId}`);
                let data = await res.json();
                if (data.success) {
                    purchasedCards = new Set(data.purchased);
                    myCards = new Set(data.my_cards);
                    updateGridDisplay();
                }
            } catch (e) {}
        }

        function updateGridDisplay() {
            for (let i = 1; i <= 1000; i++) {
                let box = document.getElementById(`card-${i}`);
                if (!box) continue;
                if (myCards.has(i)) box.className = 'box own-purchased';
                else if (purchasedCards.has(i)) box.className = 'box purchased';
                else if (selectedCards[i]) box.className = 'box selected';
                else box.className = 'box available';
            }
        }

        function handleCardClick(num, box) {
            if (purchasedCards.has(num) && !myCards.has(num)) {
                showMessage('Card already purchased!');
                return;
            }
            if (myCards.has(num)) {
                showMessage('You already own this card!');
                return;
            }
            
            if (selectedCards[num]) {
                delete selectedCards[num];
                box.className = 'box available';
            } else {
                let total = (Object.keys(selectedCards).length + 1) * 10;
                if (total > playerBalance) {
                    showMessage('Insufficient balance!');
                    return;
                }
                selectedCards[num] = true;
                box.className = 'box selected';
            }
            updateSummary();
        }

        function updateSummary() {
            let count = Object.keys(selectedCards).length;
            document.getElementById('selectedCount').innerText = count;
            document.getElementById('totalPrice').innerText = count * 10;
            document.getElementById('confirmBtn').disabled = count === 0;
        }

        function showMessage(text) {
            let msg = document.getElementById('message');
            msg.style.display = 'block';
            msg.innerText = text;
            setTimeout(() => msg.style.display = 'none', 3000);
        }

        async function confirmCards() {
            let cards = Object.keys(selectedCards).map(Number);
            if (cards.length === 0) return showMessage('Select cards!');
            
            let total = cards.length * 10;
            
            try {
                let res = await fetch(`${API_URL}/api/game/purchase`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: userId,
                        cards: cards,
                        total_price: total
                    })
                });
                
                let data = await res.json();
                if (data.success) {
                    playerBalance = data.new_balance;
                    document.getElementById('playerBalance').innerText = playerBalance;
                    
                    cards.forEach(c => {
                        myCards.add(c);
                        purchasedCards.add(c);
                    });
                    
                    selectedCards = {};
                    updateGridDisplay();
                    updateSummary();
                    
                    currentSession = data.session_id;
                    showWaitingPage(data);
                } else {
                    showMessage(data.error || 'Purchase failed');
                }
            } catch (e) {
                showMessage('Error purchasing cards');
            }
        }

        function cancelSelection() {
            selectedCards = {};
            updateGridDisplay();
            updateSummary();
        }

        function showWaitingPage(data) {
            document.getElementById('selectPage').style.display = 'none';
            document.getElementById('waitingPage').style.display = 'block';
            document.getElementById('waitingCards').innerText = `${data.total_cards_sold}/10 Cards`;
        }

        function leaveGame() {
            document.getElementById('selectPage').style.display = 'block';
            document.getElementById('waitingPage').style.display = 'none';
        }
    </script>
</body>
</html>
