<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MK BINGO</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            color: white;
            padding: 10px;
        }

        /* Main Container - Smaller */
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,215,0,0.3);
        }

        h1 {
            text-align: center;
            font-size: 2em;
            margin-bottom: 10px;
            color: gold;
            text-shadow: 0 0 10px gold;
        }

        /* Balance Box - Smaller */
        .balance-box {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 15px;
            max-width: 200px;
            margin: 10px auto;
            border: 2px solid gold;
            text-align: center;
        }

        .balance-box span {
            font-size: 1.5em;
            font-weight: bold;
            color: gold;
        }

        /* Card Grid - Proper 5x5 */
        .bingo-card {
            background: white;
            border-radius: 10px;
            padding: 8px;
            margin: 10px auto;
            max-width: 300px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        /* BINGO Header */
        .bingo-header {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 3px;
            margin-bottom: 3px;
        }

        .bingo-letter {
            background: gold;
            color: black;
            text-align: center;
            padding: 8px 0;
            font-weight: bold;
            font-size: 1.2em;
            border-radius: 5px 5px 0 0;
        }

        /* 5x5 Grid */
        .gridCard {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 3px;
        }

        .cell {
            background: #f0f0f0;
            color: #333;
            padding: 10px 0;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.9em;
            text-align: center;
            border: 1px solid #ccc;
        }

        .cell.marked {
            background: #4CAF50;
            color: white;
        }

        .cell.free {
            background: gold;
            color: black;
            font-weight: bold;
        }

        .cell.winning-cell {
            outline: 3px solid red;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { outline-color: red; }
            50% { outline-color: gold; }
            100% { outline-color: red; }
        }

        /* Winner Card Animation */
        .winner-card {
            animation: winnerGlow 2s infinite;
            border: 3px solid gold !important;
        }

        @keyframes winnerGlow {
            0% { box-shadow: 0 0 10px gold; }
            50% { box-shadow: 0 0 30px gold; }
            100% { box-shadow: 0 0 10px gold; }
        }

        /* Card Selection Grid - Smaller */
        #grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 3px;
            max-height: 200px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin: 10px 0;
        }

        .box {
            background: white;
            color: black;
            padding: 5px 0;
            border-radius: 3px;
            font-size: 0.7em;
            text-align: center;
            cursor: pointer;
        }

        .box.selected {
            background: #4CAF50;
            color: white;
        }

        /* Preview Cards - Smaller */
        #preview {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 10px 0;
        }

        .previewCard {
            background: rgba(0,0,0,0.5);
            padding: 8px;
            border-radius: 10px;
            border: 2px solid gold;
            max-width: 200px;
        }

        .previewCard h4 {
            font-size: 0.8em;
            color: gold;
            text-align: center;
            margin-bottom: 5px;
        }

        /* Buttons - Smaller */
        button {
            padding: 8px 15px;
            font-size: 0.9em;
            border: none;
            border-radius: 20px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
            margin: 5px;
        }

        .bingo-btn {
            background: #f44336;
            font-size: 1.2em;
            padding: 10px 30px;
        }

        .cancel-btn {
            background: #f44336;
        }

        /* Game Page */
        .called-numbers {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            max-height: 80px;
            overflow-y: auto;
        }

        .number-ball {
            display: inline-block;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: gold;
            color: black;
            text-align: center;
            line-height: 30px;
            margin: 2px;
            font-size: 0.8em;
        }

        .timer {
            font-size: 1.5em;
            color: gold;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        /* Toggle Switch - Smaller */
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 10px 0;
        }

        .toggle-switch {
            width: 60px;
            height: 30px;
        }

        .slider:before {
            height: 24px;
            width: 24px;
            left: 3px;
            bottom: 3px;
        }

        input:checked + .slider:before {
            transform: translateX(30px);
        }

        /* Winners Display */
        .winners-list {
            margin-top: 15px;
            padding: 10px;
            background: rgba(255,215,0,0.2);
            border-radius: 10px;
        }

        .winner-item {
            padding: 8px;
            margin: 5px 0;
            background: rgba(0,0,0,0.3);
            border-radius: 5px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎰 MK BINGO</h1>

        <!-- Player Info -->
        <div class="balance-box">
            <span id="playerBalance">{{ balance|default('1000') }}</span> ETB
        </div>

        <!-- Card Selection Page -->
        <div id="selectPage">
            <h3 style="text-align: center; font-size: 1.2em;">🎫 Select Cards (1-1000)</h3>
            <div id="grid"></div>

            <div style="text-align: center; margin: 5px;">
                <span>Selected: <span id="selectedCount">0</span></span>
                <span style="margin-left: 15px;">Total: <span id="totalPrice">0</span> ETB</span>
            </div>

            <div style="text-align: center;">
                <button onclick="confirmCards()">✅ CONFIRM</button>
                <button class="cancel-btn" onclick="cancelSelection()">❌ CANCEL</button>
            </div>

            <h3 style="text-align: center; font-size: 1.2em; margin-top: 10px;">📋 Selected Cards</h3>
            <div id="preview"></div>
        </div>

        <!-- Game Page -->
        <div id="gamePage" style="display: none;">
            <div class="game-header">
                <div>
                    <h2 style="font-size: 1.2em;">🎯 Game</h2>
                    <p style="font-size: 0.8em;">Prize: <span id="currentGamePrize">2000</span> ETB</p>
                </div>
                <div class="timer" id="timer">00:00</div>
            </div>

            <!-- Auto-Mark Toggle -->
            <div class="toggle-container">
                <span style="font-size: 0.8em;">MANUAL</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="autoMarkToggle" checked>
                    <span class="slider"></span>
                </label>
                <span style="font-size: 0.8em;">AUTO</span>
            </div>

            <!-- Called Numbers -->
            <div class="called-numbers">
                <div id="numbersList"></div>
            </div>

            <!-- BINGO Button -->
            <div style="text-align: center;">
                <button class="bingo-btn" onclick="callBingo()" id="bingoBtn" disabled>🔴 BINGO!</button>
            </div>

            <!-- Game Cards -->
            <div id="gameCards"></div>

            <!-- Back Button -->
            <div style="text-align: center;">
                <button onclick="backToSelection()">🔙 BACK</button>
            </div>

            <!-- Winners Display -->
            <div id="winnersDisplay" class="winners-list" style="display: none;">
                <h3 style="text-align: center;">🏆 WINNERS</h3>
                <div id="winnersList"></div>
            </div>
        </div>
    </div>

    <script>
        // ==================== GLOBAL VARIABLES ====================
        let selectedCards = {};
        let playerBalance = {{ balance|default(1000) }};
        let userId = "{{ user_id|default('guest') }}";
        let currentGameCards = {};
        let gameSettings = {
            calledNumbers: [],
            winners: [],
            isGameActive: false,
            gameType: 'full house',
            prizeAmount: 2000,
            cardPrice: 10
        };
        let bingoButtonEnabled = false;
        let autoMarkEnabled = true;
        let timerSeconds = 0;
        let gameTimer = null;
        let callInterval = null;

        // API endpoint
        const API_URL = window.location.origin;

        // ==================== INITIALIZATION ====================
        window.onload = function() {
            createNumberGrid();
            loadGameSettings();
            updateSummary();
        };

        // ==================== API FUNCTIONS ====================
        async function loadGameSettings() {
            try {
                const response = await fetch(`${API_URL}/api/game/settings`);
                const data = await response.json();
                if (data.success) {
                    gameSettings.gameType = data.game_type;
                    gameSettings.cardPrice = data.card_price;
                    gameSettings.prizeAmount = data.prize_pool;
                    
                    document.getElementById('currentGamePrize').innerText = data.prize_pool;
                }
            } catch (error) {
                console.log('Using default settings');
            }
        }

        // ==================== CREATE NUMBER GRID ====================
        function createNumberGrid() {
            let grid = document.getElementById("grid");
            for (let i = 1; i <= 200; i++) { // Show only 200 for mobile
                let box = document.createElement("div");
                box.className = "box";
                box.innerText = i;
                box.id = `card-${i}`;

                box.onclick = () => {
                    if (gameSettings.isGameActive) {
                        alert("Game in progress!");
                        return;
                    }
                    
                    if (selectedCards[i]) {
                        delete selectedCards[i];
                        box.classList.remove("selected");
                    } else {
                        selectedCards[i] = generateCard(i);
                        box.classList.add("selected");
                    }

                    updatePreview();
                    updateSummary();
                };

                grid.appendChild(box);
            }
        }

        // ==================== GENERATE CARD (Proper BINGO format) ====================
        function generateCard(cardNumber) {
            let card = [];
            let seed = cardNumber || Math.floor(Math.random() * 1000);
            
            // Generate numbers for each column (BINGO format)
            // B: 1-15, I: 16-30, N: 31-45, G: 46-60, O: 61-75
            
            for (let col = 0; col < 5; col++) {
                let min = col * 15 + 1;
                let max = (col + 1) * 15;
                
                // Generate 5 unique numbers for this column
                let colNumbers = [];
                while (colNumbers.length < 5) {
                    // Use seed to make it deterministic but varied
                    let n = ((seed * (col + 1) + colNumbers.length * 7) % (max - min + 1)) + min;
                    if (!colNumbers.includes(n)) {
                        colNumbers.push(n);
                    }
                }
                
                // Add to card in correct order (row by row)
                for (let row = 0; row < 5; row++) {
                    let index = row * 5 + col;
                    card[index] = colNumbers[row];
                }
            }
            
            // Make the center cell FREE (position 12 in 0-based indexing, row 2, col 2)
            card[12] = "FREE";
            
            return card;
        }

        // ==================== CREATE CARD ELEMENT (With BINGO header) ====================
        function createCardElement(card, cardNumber, isWinner = false) {
            let div = document.createElement("div");
            div.className = "bingo-card";
            if (isWinner) div.classList.add("winner-card");

            let title = document.createElement("h4");
            title.innerText = `#${cardNumber}`;
            title.style.textAlign = 'center';
            title.style.color = 'gold';
            title.style.margin = '5px 0';
            div.appendChild(title);

            // Add BINGO header
            let header = document.createElement("div");
            header.className = "bingo-header";
            ['B', 'I', 'N', 'G', 'O'].forEach(letter => {
                let l = document.createElement("div");
                l.className = "bingo-letter";
                l.innerText = letter;
                header.appendChild(l);
            });
            div.appendChild(header);

            // Create grid
            let grid = document.createElement("div");
            grid.className = "gridCard";

            card.forEach((n, index) => {
                let cell = document.createElement("div");
                cell.className = "cell";
                
                if (n === "FREE") {
                    cell.classList.add("free");
                }
                
                // Auto-mark called numbers
                if (n !== "FREE" && gameSettings.calledNumbers.includes(n)) {
                    cell.classList.add("marked");
                }
                
                // Manual mark click
                cell.onclick = function(e) {
                    e.stopPropagation();
                    if (!autoMarkEnabled && n !== "FREE") {
                        this.classList.toggle("marked");
                    }
                };
                
                // Highlight winning cells
                if (gameSettings.winners.some(w => w.cardNumber == cardNumber && w.cells.includes(index))) {
                    cell.classList.add("winning-cell");
                }
                
                cell.innerText = n;
                grid.appendChild(cell);
            });

            div.appendChild(grid);
            return div;
        }

        // ==================== UPDATE PREVIEW ====================
        function updatePreview() {
            let preview = document.getElementById("preview");
            preview.innerHTML = "";
            
            let count = 0;
            for (let cardNum in selectedCards) {
                if (count++ >= 3) break; // Show only 3 previews
                
                let div = document.createElement("div");
                div.className = "previewCard";

                let title = document.createElement("h4");
                title.innerText = `Card #${cardNum}`;
                div.appendChild(title);

                // Add mini BINGO header
                let header = document.createElement("div");
                header.style.display = 'grid';
                header.style.gridTemplateColumns = 'repeat(5,1fr)';
                header.style.gap = '2px';
                header.style.marginBottom = '2px';
                ['B','I','N','G','O'].forEach(letter => {
                    let l = document.createElement("div");
                    l.style.background = 'gold';
                    l.style.color = 'black';
                    l.style.textAlign = 'center';
                    l.style.fontSize = '0.6em';
                    l.style.padding = '2px 0';
                    l.style.borderRadius = '2px';
                    l.innerText = letter;
                    header.appendChild(l);
                });
                div.appendChild(header);

                let grid = document.createElement("div");
                grid.style.display = 'grid';
                grid.style.gridTemplateColumns = 'repeat(5,1fr)';
                grid.style.gap = '2px';

                selectedCards[cardNum].forEach(n => {
                    let cell = document.createElement("div");
                    cell.style.background = n === "FREE" ? 'gold' : 'white';
                    cell.style.color = 'black';
                    cell.style.padding = '3px 0';
                    cell.style.fontSize = '0.6em';
                    cell.style.textAlign = 'center';
                    cell.style.borderRadius = '2px';
                    cell.innerText = n;
                    grid.appendChild(cell);
                });

                div.appendChild(grid);
                preview.appendChild(div);
            }
            
            if (Object.keys(selectedCards).length > 3) {
                let more = document.createElement("p");
                more.innerText = `...and ${Object.keys(selectedCards).length - 3} more`;
                more.style.textAlign = 'center';
                more.style.fontSize = '0.8em';
                preview.appendChild(more);
            }
        }

        // ==================== UPDATE SUMMARY ====================
        function updateSummary() {
            let count = Object.keys(selectedCards).length;
            let total = count * gameSettings.cardPrice;
            
            document.getElementById("selectedCount").innerText = count;
            document.getElementById("totalPrice").innerText = total;
        }

        // ==================== CONFIRM CARDS ====================
        async function confirmCards() {
            let count = Object.keys(selectedCards).length;
            let total = count * gameSettings.cardPrice;
            
            if (count === 0) {
                alert("Please select at least one card!");
                return;
            }
            
            if (playerBalance < total) {
                alert(`Insufficient balance! Need ${total} ETB`);
                return;
            }
            
            playerBalance -= total;
            document.getElementById("playerBalance").innerText = playerBalance;
            
            currentGameCards = { ...selectedCards };
            
            alert(`✅ ${count} cards purchased!`);
            showGamePage();
        }

        // ==================== CANCEL SELECTION ====================
        function cancelSelection() {
            if (Object.keys(selectedCards).length > 0) {
                if (confirm("Cancel all selections?")) {
                    selectedCards = {};
                    document.querySelectorAll(".box").forEach(b => b.classList.remove("selected"));
                    updatePreview();
                    updateSummary();
                }
            }
        }

        // ==================== SHOW GAME PAGE ====================
        function showGamePage() {
            document.getElementById("selectPage").style.display = "none";
            document.getElementById("gamePage").style.display = "block";
            startTimer();
            updateGameCards();
            startNumberCalls();
        }

        // ==================== UPDATE GAME CARDS ====================
        function updateGameCards() {
            let game = document.getElementById("gameCards");
            game.innerHTML = "";
            
            for (let cardNum in currentGameCards) {
                let isWinner = gameSettings.winners.some(w => w.cardNumber == cardNum);
                let cardElement = createCardElement(currentGameCards[cardNum], cardNum, isWinner);
                game.appendChild(cardElement);
            }
        }

        // ==================== BACK TO SELECTION ====================
        function backToSelection() {
            document.getElementById("selectPage").style.display = "block";
            document.getElementById("gamePage").style.display = "none";
            clearInterval(gameTimer);
            if (callInterval) clearInterval(callInterval);
        }

        // ==================== CALL BINGO ====================
        async function callBingo() {
            if (!bingoButtonEnabled) {
                alert("Bingo not available yet!");
                return;
            }
            
            let winResult = checkForWin(currentGameCards);
            
            if (winResult) {
                gameSettings.winners.push({
                    cardNumber: winResult.card,
                    cells: winResult.cells,
                    winType: gameSettings.gameType
                });
                
                let prizePerWinner = gameSettings.prizeAmount / gameSettings.winners.length;
                playerBalance += prizePerWinner;
                document.getElementById("playerBalance").innerText = playerBalance;
                
                alert("🎉 BINGO! YOU WON! 🎉");
                document.getElementById("bingoBtn").disabled = true;
                bingoButtonEnabled = false;
                
                showWinners();
                gameSettings.isGameActive = false;
                updateGameCards();
            } else {
                alert("❌ FALSE BINGO! You're out!");
                delete currentGameCards;
                document.getElementById("gameCards").innerHTML = "<h3 style='color: red; text-align: center;'>❌ DISQUALIFIED</h3>";
                document.getElementById("bingoBtn").disabled = true;
            }
        }

        // ==================== CHECK FOR WIN ====================
        function checkForWin(cards) {
            for (let cardNum in cards) {
                let card = cards[cardNum];
                let called = gameSettings.calledNumbers;
                
                // Check full house
                let allMarked = card.every((num, i) => 
                    num === "FREE" || called.includes(num)
                );
                if (allMarked) return { card: cardNum, cells: card.map((_, i) => i) };
                
                // Check rows
                for (let row = 0; row < 5; row++) {
                    let rowMarked = true;
                    let cells = [];
                    for (let col = 0; col < 5; col++) {
                        let index = row * 5 + col;
                        if (card[index] !== "FREE" && !called.includes(card[index])) {
                            rowMarked = false;
                            break;
                        }
                        cells.push(index);
                    }
                    if (rowMarked) return { card: cardNum, cells };
                }
                
                // Check columns
                for (let col = 0; col < 5; col++) {
                    let colMarked = true;
                    let cells = [];
                    for (let row = 0; row < 5; row++) {
                        let index = row * 5 + col;
                        if (card[index] !== "FREE" && !called.includes(card[index])) {
                            colMarked = false;
                            break;
                        }
                        cells.push(index);
                    }
                    if (colMarked) return { card: cardNum, cells };
                }
            }
            return null;
        }

        // ==================== SHOW WINNERS ====================
        function showWinners() {
            if (gameSettings.winners.length === 0) return;
            
            document.getElementById("winnersDisplay").style.display = "block";
            let winnersList = document.getElementById("winnersList");
            winnersList.innerHTML = "";
            
            gameSettings.winners.forEach((winner, index) => {
                let div = document.createElement("div");
                div.className = "winner-item";
                
                let prizePerWinner = gameSettings.prizeAmount / gameSettings.winners.length;
                
                div.innerHTML = `
                    <strong>🏆 Winner #${index + 1}</strong><br>
                    Card #${winner.cardNumber}<br>
                    Prize: ${prizePerWinner} ETB
                `;
                winnersList.appendChild(div);
            });
        }

        // ==================== AUTO-MARK TOGGLE ====================
        document.getElementById('autoMarkToggle').addEventListener('change', function(e) {
            autoMarkEnabled = e.target.checked;
        });

        // ==================== SIMULATE NUMBER CALLS ====================
        function startNumberCalls() {
            gameSettings.isGameActive = true;
            gameSettings.calledNumbers = [];
            
            callInterval = setInterval(() => {
                if (!gameSettings.isGameActive) return;
                
                let num = Math.floor(Math.random() * 75) + 1;
                if (!gameSettings.calledNumbers.includes(num)) {
                    gameSettings.calledNumbers.push(num);
                    
                    // Add to display
                    let list = document.getElementById('numbersList');
                    let ball = document.createElement('span');
                    ball.className = 'number-ball';
                    ball.innerText = num;
                    list.appendChild(ball);
                    
                    // Update cards
                    updateGameCards();
                    
                    // Enable Bingo button
                    bingoButtonEnabled = true;
                    document.getElementById('bingoBtn').disabled = false;
                }
            }, 3000);
        }

        // ==================== TIMER ====================
        function startTimer() {
            timerSeconds = 0;
            if (gameTimer) clearInterval(gameTimer);
            gameTimer = setInterval(() => {
                timerSeconds++;
                let mins = Math.floor(timerSeconds / 60);
                let secs = timerSeconds % 60;
                document.getElementById('timer').innerText = 
                    `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            }, 1000);
        }
    </script>
</body>
</html>
