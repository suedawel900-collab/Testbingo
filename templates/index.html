<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MK BINGO - Game Flow</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            color: white;
            padding: 10px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,215,0,0.3);
        }

        h1 {
            text-align: center;
            font-size: 1.8em;
            margin-bottom: 10px;
            color: gold;
        }

        /* Balance Box */
        .balance-box {
            background: rgba(0,0,0,0.5);
            padding: 8px 15px;
            border-radius: 30px;
            max-width: 180px;
            margin: 10px auto;
            border: 2px solid gold;
            text-align: center;
        }

        .balance-box span {
            font-size: 1.3em;
            font-weight: bold;
            color: gold;
        }

        /* Game Status - Shows waiting for players */
        .game-status {
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
            border: 2px solid gold;
            text-align: center;
        }

        .status-title {
            font-size: 1.2em;
            color: gold;
            margin-bottom: 10px;
        }

        .cards-progress {
            font-size: 2em;
            font-weight: bold;
            color: gold;
        }

        .players-list {
            margin-top: 15px;
            max-height: 150px;
            overflow-y: auto;
        }

        .player-item {
            background: rgba(255,255,255,0.1);
            padding: 8px;
            margin: 5px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
        }

        .waiting-message {
            color: #ff9800;
            font-size: 1.1em;
            margin: 10px 0;
        }

        .ready-message {
            color: #4CAF50;
            font-size: 1.1em;
            margin: 10px 0;
        }

        /* Countdown */
        .countdown-container {
            text-align: center;
            padding: 30px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            border: 3px solid gold;
            margin: 20px 0;
        }

        .countdown-number {
            color: gold;
            font-size: 5em;
            font-weight: bold;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Game Page */
        .game-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
        }

        .timer {
            font-size: 1.8em;
            color: gold;
            font-weight: bold;
        }

        /* Mode Toggle */
        .mode-container {
            background: rgba(0,0,0,0.4);
            padding: 10px;
            border-radius: 40px;
            margin: 10px 0;
            border: 2px solid gold;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 90px;
            height: 38px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #f44336, #d32f2f);
            transition: .4s;
            border-radius: 38px;
            border: 2px solid white;
        }

        .slider:before {
            position: absolute;
            content: "MANUAL";
            height: 30px;
            width: 45px;
            left: 4px;
            bottom: 3px;
            background: white;
            transition: .4s;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7em;
            font-weight: bold;
            color: black;
        }

        input:checked + .slider {
            background: linear-gradient(135deg, #4CAF50, #45a049);
        }

        input:checked + .slider:before {
            content: "AUTO";
            transform: translateX(45px);
        }

        /* Called Numbers */
        .called-numbers {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            min-height: 60px;
            margin: 10px 0;
        }

        .number-ball {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: gold;
            color: black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* BINGO Button */
        .bingo-btn {
            background: #f44336;
            color: white;
            font-size: 1.8em;
            font-weight: bold;
            padding: 15px;
            border: none;
            border-radius: 50px;
            width: 100%;
            margin: 15px 0;
            cursor: pointer;
            animation: bingoPulse 1.5s infinite;
        }

        .bingo-btn:disabled {
            opacity: 0.5;
            animation: none;
        }

        @keyframes bingoPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        /* Cards Grid - 2 per row */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px 0;
            max-height: 400px;
            overflow-y: auto;
        }

        .bingo-card {
            background: white;
            border-radius: 10px;
            padding: 8px;
            border: 2px solid gold;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.8em;
        }

        .card-number {
            color: gold;
            font-weight: bold;
        }

        .bingo-header {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px;
            margin-bottom: 2px;
        }

        .bingo-letter {
            background: gold;
            color: black;
            text-align: center;
            padding: 3px;
            font-size: 0.8em;
            font-weight: bold;
            border-radius: 3px;
        }

        .gridCard {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px;
        }

        .cell {
            background: #f0f0f0;
            color: #333;
            text-align: center;
            padding: 5px 0;
            font-size: 0.7em;
            font-weight: bold;
            border-radius: 3px;
        }

        .cell.marked {
            background: #4CAF50;
            color: white;
        }

        .cell.free {
            background: gold;
            color: black;
        }

        /* Card Selection */
        #grid {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 2px;
            max-height: 150px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin: 10px 0;
        }

        .box {
            background: white;
            color: black;
            padding: 4px 0;
            font-size: 0.6em;
            text-align: center;
            cursor: pointer;
            border-radius: 3px;
        }

        .box.selected {
            background: #4CAF50;
            color: white;
        }

        .summary-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 20px;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            background: #4CAF50;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
        }

        .cancel-btn {
            background: #f44336;
        }

        .back-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid gold;
            width: 100%;
            padding: 12px;
            margin-top: 10px;
        }

        /* Page visibility */
        #selectPage, #waitingPage, #countdownPage, #gamePage {
            display: none;
        }

        #selectPage.active, #waitingPage.active, #countdownPage.active, #gamePage.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎰 MK BINGO</h1>

        <!-- Balance -->
        <div class="balance-box">
            <span id="playerBalance">{{ balance|default('1000') }}</span> ETB
        </div>

        <!-- SELECTION PAGE - Buy Cards -->
        <div id="selectPage" class="active">
            <h3 style="text-align: center;">🎫 Select Cards (1-1000)</h3>
            
            <!-- Range Selector -->
            <div style="display: flex; gap: 3px; flex-wrap: wrap; justify-content: center; margin: 5px 0;" id="rangeSelector"></div>
            
            <!-- Card Grid -->
            <div id="grid"></div>

            <div class="summary-bar">
                <span>Your Cards: <span id="selectedCount">0</span></span>
                <span>Total: <span id="totalPrice">0</span> ETB</span>
            </div>

            <div style="text-align: center;">
                <button onclick="confirmCards()" id="confirmBtn">✅ BUY CARDS</button>
                <button class="cancel-btn" onclick="cancelSelection()">❌ CLEAR</button>
            </div>
            
            <div class="footer-info" style="text-align:center; font-size:0.8em; margin-top:10px;">
                * Minimum 1 card to join • Game starts when 10 total cards sold
            </div>
        </div>

        <!-- WAITING PAGE - Wait for other players -->
        <div id="waitingPage">
            <div class="game-status">
                <div class="status-title">⏳ WAITING FOR PLAYERS</div>
                <div class="cards-progress">
                    <span id="totalCardsSold">0</span>/10 Cards
                </div>
                <div style="margin: 10px 0; font-size: 1.2em;" id="playersCount">0 Players Joined</div>
                
                <div class="players-list" id="playersList">
                    <!-- Players will appear here -->
                </div>
                
                <div class="waiting-message" id="waitingMessage">
                    Need <span id="cardsNeeded">10</span> more cards to start...
                </div>
                
                <div style="margin-top: 20px;">
                    <button class="back-btn" onclick="backToSelection()">🔙 Cancel & Leave</button>
                </div>
            </div>
        </div>

        <!-- COUNTDOWN PAGE - 30s Countdown -->
        <div id="countdownPage">
            <div class="countdown-container">
                <div class="countdown-number" id="countdown">30</div>
                <div style="font-size: 1.3em; margin: 10px;">Game Starting!</div>
                <div style="color: gold;" id="countdownInfo"></div>
            </div>
        </div>

        <!-- GAME PAGE - Play Game -->
        <div id="gamePage">
            <div class="game-header">
                <div>🎯 GAME</div>
                <div class="timer" id="gameTimer">00:00</div>
            </div>

            <!-- Mode Toggle -->
            <div class="mode-container">
                <span style="color:#ff9800;">✋ MANUAL</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="markModeToggle" checked onchange="toggleMarkMode()">
                    <span class="slider"></span>
                </label>
                <span style="color:#4CAF50;">🔄 AUTO</span>
            </div>

            <!-- Called Numbers -->
            <div class="called-numbers" id="numbersList"></div>

            <!-- BINGO Button -->
            <button class="bingo-btn" onclick="callBingo()" id="bingoBtn" disabled>🔴 BINGO!</button>

            <!-- Cards - 2 per row -->
            <div class="cards-grid" id="gameCards"></div>

            <!-- Back Button -->
            <button class="back-btn" onclick="backToSelection()">🔙 LEAVE GAME</button>
        </div>
    </div>

    <script>
        // ==================== GLOBAL VARIABLES ====================
        let selectedCards = {};
        let playerBalance = {{ balance|default(1000) }};
        let userId = "{{ user_id|default('guest') }}";
        
        // Game state
        let currentGameCards = {};
        let gameSettings = {
            calledNumbers: [],
            winners: [],
            isGameActive: false,
            gameType: 'full house',
            prizeAmount: 2000,
            cardPrice: 10,
            minCardsToStart: 10
        };
        
        // Session info (would come from server in real app)
        let sessionInfo = {
            totalCardsSold: 0,
            players: [],  // { id, name, cards }
            status: 'waiting'
        };
        
        // Marking mode
        let autoMarkEnabled = true;
        let manuallyMarked = {};
        let disabledCards = new Set();
        
        // Timers
        let gameTimer = null;
        let callInterval = null;
        let countdownInterval = null;
        let sessionCheckInterval = null;
        let gameStarted = false;
        let bingoButtonEnabled = false;

        const API_URL = window.location.origin;

        // ==================== PAGE MANAGEMENT ====================
        function showPage(page) {
            document.getElementById('selectPage').classList.remove('active');
            document.getElementById('waitingPage').classList.remove('active');
            document.getElementById('countdownPage').classList.remove('active');
            document.getElementById('gamePage').classList.remove('active');
            document.getElementById(page + 'Page').classList.add('active');
        }

        // ==================== INIT ====================
        window.onload = function() {
            createNumberGrid();
            createRangeSelector();
            updateSummary();
            loadGameSettings();
            
            // Simulate session updates (in real app, this would be from server)
            sessionCheckInterval = setInterval(checkSessionStatus, 2000);
        };

        // ==================== SIMULATE SESSION (REPLACE WITH REAL API) ====================
        function checkSessionStatus() {
            // This simulates other players joining
            // In real app, this would fetch from server
            
            if (sessionInfo.status === 'waiting') {
                updateWaitingPage();
            }
        }

        // ==================== RANGE SELECTOR ====================
        function createRangeSelector() {
            let selector = document.getElementById("rangeSelector");
            let ranges = [
                {start: 1, end: 200}, {start: 201, end: 400}, {start: 401, end: 600},
                {start: 601, end: 800}, {start: 801, end: 1000}
            ];
            
            ranges.forEach(range => {
                let btn = document.createElement("button");
                btn.style.padding = '5px 8px';
                btn.style.fontSize = '0.7em';
                btn.style.background = 'rgba(255,215,0,0.2)';
                btn.style.border = '1px solid gold';
                btn.style.borderRadius = '12px';
                btn.style.color = 'white';
                btn.style.cursor = 'pointer';
                btn.innerText = `${range.start}-${range.end}`;
                btn.onclick = () => scrollToRange(range.start);
                selector.appendChild(btn);
            });
        }

        function scrollToRange(start) {
            let grid = document.getElementById("grid");
            let firstCard = document.getElementById(`card-${start}`);
            if (firstCard) firstCard.scrollIntoView({behavior: 'smooth', block: 'center'});
        }

        // ==================== CREATE CARD GRID ====================
        function createNumberGrid() {
            let grid = document.getElementById("grid");
            grid.innerHTML = "";
            
            for (let i = 1; i <= 1000; i++) {
                let box = document.createElement("div");
                box.className = "box";
                box.innerText = i;
                box.id = `card-${i}`;

                box.onclick = () => {
                    if (gameStarted) {
                        alert("Game in progress!");
                        return;
                    }
                    
                    if (selectedCards[i]) {
                        delete selectedCards[i];
                        box.classList.remove("selected");
                    } else {
                        selectedCards[i] = generateBingoCard(i);
                        box.classList.add("selected");
                    }
                    updateSummary();
                };
                grid.appendChild(box);
            }
        }

        // ==================== GENERATE CARD ====================
        function generateBingoCard(cardNumber) {
            let card = new Array(25).fill(0);
            let seed = cardNumber || Math.floor(Math.random() * 1000);
            
            // Generate columns
            let bCol = []; while (bCol.length < 5) { let n = ((seed * 1 + bCol.length * 7) % 15) + 1; if (!bCol.includes(n)) bCol.push(n); }
            let iCol = []; while (iCol.length < 5) { let n = ((seed * 2 + iCol.length * 7) % 15) + 16; if (!iCol.includes(n)) iCol.push(n); }
            let nCol = []; while (nCol.length < 5) { let n = ((seed * 3 + nCol.length * 7) % 15) + 31; if (!nCol.includes(n)) nCol.push(n); }
            let gCol = []; while (gCol.length < 5) { let n = ((seed * 4 + gCol.length * 7) % 15) + 46; if (!gCol.includes(n)) gCol.push(n); }
            let oCol = []; while (oCol.length < 5) { let n = ((seed * 5 + oCol.length * 7) % 15) + 61; if (!oCol.includes(n)) oCol.push(n); }
            
            for (let row = 0; row < 5; row++) {
                card[row * 5 + 0] = bCol[row];
                card[row * 5 + 1] = iCol[row];
                card[row * 5 + 2] = nCol[row];
                card[row * 5 + 3] = gCol[row];
                card[row * 5 + 4] = oCol[row];
            }
            card[12] = "FREE";
            return card;
        }

        // ==================== LOAD SETTINGS ====================
        async function loadGameSettings() {
            try {
                let response = await fetch(`${API_URL}/api/game/settings`);
                let data = await response.json();
                if (data.success) {
                    gameSettings.gameType = data.game_type;
                    gameSettings.cardPrice = data.card_price;
                    gameSettings.prizeAmount = data.prize_pool;
                }
            } catch (e) {}
        }

        // ==================== UPDATE SUMMARY ====================
        function updateSummary() {
            let count = Object.keys(selectedCards).length;
            let total = count * gameSettings.cardPrice;
            document.getElementById("selectedCount").innerText = count;
            document.getElementById("totalPrice").innerText = total;
        }

        // ==================== CONFIRM CARDS - Player joins game ====================
        async function confirmCards() {
            let count = Object.keys(selectedCards).length;
            let total = count * gameSettings.cardPrice;
            
            // NEW RULE: Minimum 1 card to join
            if (count === 0) {
                alert("Please select at least 1 card to join the game!");
                return;
            }
            
            if (playerBalance < total) {
                alert(`Insufficient balance! Need ${total} ETB`);
                return;
            }
            
            // Deduct balance
            playerBalance -= total;
            document.getElementById("playerBalance").innerText = playerBalance;
            
            // Save player's cards
            for (let cardNum in selectedCards) {
                currentGameCards[cardNum] = {
                    numbers: selectedCards[cardNum],
                    active: true
                };
            }
            
            // Add player to session
            let playerName = `Player_${userId.slice(-4)}`;
            sessionInfo.players.push({
                id: userId,
                name: playerName,
                cards: count
            });
            sessionInfo.totalCardsSold += count;
            
            // Clear selection
            selectedCards = {};
            document.querySelectorAll(".box").forEach(b => b.classList.remove("selected"));
            updateSummary();
            
            // Send to server (in real app)
            try {
                await fetch(`${API_URL}/api/game/purchase`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: userId,
                        cards_bought: count,
                        total_paid: total
                    })
                });
            } catch (e) {}
            
            // Go to waiting page
            showPage('waiting');
            updateWaitingPage();
        }

        function cancelSelection() {
            if (Object.keys(selectedCards).length > 0 && confirm("Clear all?")) {
                selectedCards = {};
                document.querySelectorAll(".box").forEach(b => b.classList.remove("selected"));
                updateSummary();
            }
        }

        // ==================== WAITING PAGE - Show players and cards ====================
        function updateWaitingPage() {
            document.getElementById('totalCardsSold').innerText = sessionInfo.totalCardsSold;
            document.getElementById('playersCount').innerText = sessionInfo.players.length + ' Players Joined';
            
            let needed = Math.max(0, 10 - sessionInfo.totalCardsSold);
            document.getElementById('cardsNeeded').innerText = needed;
            
            // Update players list
            let playersList = document.getElementById('playersList');
            playersList.innerHTML = '';
            
            sessionInfo.players.forEach(p => {
                let div = document.createElement('div');
                div.className = 'player-item';
                div.innerHTML = `
                    <span>${p.name}</span>
                    <span style="color:gold;">${p.cards} cards</span>
                `;
                playersList.appendChild(div);
            });
            
            // Check if we have 10 cards total
            if (sessionInfo.totalCardsSold >= 10 && sessionInfo.status === 'waiting') {
                sessionInfo.status = 'countdown';
                startCountdown();
            }
        }

        // ==================== COUNTDOWN ====================
        function startCountdown() {
            showPage('countdown');
            
            let countdown = 30;
            document.getElementById('countdown').innerText = countdown;
            document.getElementById('countdownInfo').innerHTML = `
                🎮 ${sessionInfo.totalCardsSold} cards sold<br>
                👥 ${sessionInfo.players.length} players
            `;
            
            countdownInterval = setInterval(() => {
                countdown--;
                document.getElementById('countdown').innerText = countdown;
                
                if (countdown <= 0) {
                    clearInterval(countdownInterval);
                    startGame();
                }
            }, 1000);
        }

        // ==================== START GAME ====================
        function startGame() {
            showPage('game');
            
            gameStarted = true;
            gameSettings.isGameActive = true;
            gameSettings.calledNumbers = [];
            gameSettings.winners = [];
            disabledCards.clear();
            manuallyMarked = {};
            
            startTimer();
            showGameCards();
            startNumberCalls();
        }

        // ==================== SHOW GAME CARDS ====================
        function showGameCards() {
            let container = document.getElementById("gameCards");
            container.innerHTML = "";
            
            let sortedCards = Object.keys(currentGameCards).sort((a,b) => parseInt(a) - parseInt(b));
            
            for (let cardNum of sortedCards) {
                let cardData = currentGameCards[cardNum];
                let isDisabled = disabledCards.has(parseInt(cardNum));
                
                let div = document.createElement("div");
                div.className = "bingo-card";

                // Header
                let header = document.createElement("div");
                header.className = "card-header";
                header.innerHTML = `
                    <span class="card-number">#${cardNum}</span>
                    <span style="color:${isDisabled ? '#f44336' : '#4CAF50'}">${isDisabled ? '❌' : '✓'}</span>
                `;
                div.appendChild(header);

                // BINGO Header
                let bingoHeader = document.createElement("div");
                bingoHeader.className = "bingo-header";
                ['B', 'I', 'N', 'G', 'O'].forEach(letter => {
                    let l = document.createElement("div");
                    l.className = "bingo-letter";
                    l.innerText = letter;
                    bingoHeader.appendChild(l);
                });
                div.appendChild(bingoHeader);

                // Grid
                let grid = document.createElement("div");
                grid.className = "gridCard";

                cardData.numbers.forEach((num, index) => {
                    let cell = document.createElement("div");
                    cell.className = "cell";
                    
                    if (num === "FREE") {
                        cell.classList.add("free");
                    } else if (gameSettings.calledNumbers.includes(num)) {
                        cell.classList.add("marked");
                    }
                    
                    cell.innerText = num;
                    grid.appendChild(cell);
                });

                div.appendChild(grid);
                container.appendChild(div);
            }
        }

        // ==================== TOGGLE MODE ====================
        function toggleMarkMode() {
            autoMarkEnabled = document.getElementById('markModeToggle').checked;
        }

        // ==================== CALL BINGO ====================
        function callBingo() {
            if (!bingoButtonEnabled) return alert("Wait for numbers!");
            
            // Simple win check (full house)
            let allMarked = true;
            for (let cardNum in currentGameCards) {
                if (disabledCards.has(parseInt(cardNum))) continue;
                let card = currentGameCards[cardNum].numbers;
                for (let i = 0; i < card.length; i++) {
                    if (card[i] !== "FREE" && !gameSettings.calledNumbers.includes(card[i])) {
                        allMarked = false;
                        break;
                    }
                }
            }
            
            if (allMarked) {
                alert("🎉 BINGO! YOU WIN!");
                document.getElementById('bingoBtn').disabled = true;
            } else {
                alert("❌ FALSE BINGO! One card disabled");
                // Disable first active card
                for (let cardNum in currentGameCards) {
                    if (!disabledCards.has(parseInt(cardNum))) {
                        disabledCards.add(parseInt(cardNum));
                        break;
                    }
                }
                showGameCards();
            }
        }

        // ==================== BACK TO SELECTION ====================
        function backToSelection() {
            if (countdownInterval) clearInterval(countdownInterval);
            if (gameTimer) clearInterval(gameTimer);
            if (callInterval) clearInterval(callInterval);
            
            // Remove player from session
            sessionInfo.players = sessionInfo.players.filter(p => p.id !== userId);
            sessionInfo.totalCardsSold = sessionInfo.players.reduce((sum, p) => sum + p.cards, 0);
            sessionInfo.status = 'waiting';
            
            showPage('select');
            
            gameStarted = false;
            gameSettings.isGameActive = false;
            gameSettings.calledNumbers = [];
            disabledCards.clear();
            document.getElementById('numbersList').innerHTML = '';
        }

        // ==================== START NUMBER CALLS ====================
        function startNumberCalls() {
            callInterval = setInterval(() => {
                if (!gameSettings.isGameActive) return;
                
                let num = Math.floor(Math.random() * 75) + 1;
                if (!gameSettings.calledNumbers.includes(num)) {
                    gameSettings.calledNumbers.push(num);
                    
                    let list = document.getElementById('numbersList');
                    let ball = document.createElement('span');
                    ball.className = 'number-ball';
                    ball.innerText = num;
                    list.appendChild(ball);
                    
                    showGameCards();
                    
                    document.getElementById('bingoBtn').disabled = false;
                    bingoButtonEnabled = true;
                }
            }, 3000);
        }

        // ==================== TIMER ====================
        function startTimer() {
            let seconds = 0;
            gameTimer = setInterval(() => {
                seconds++;
                let mins = Math.floor(seconds / 60);
                let secs = seconds % 60;
                document.getElementById('gameTimer').innerText = 
                    `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            }, 1000);
        }
    </script>
</body>
</html>
