<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MK BINGO - Play</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            color: white;
            padding: 10px;
        }

        /* Main Container */
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,215,0,0.3);
        }

        h1 {
            text-align: center;
            font-size: 2em;
            margin-bottom: 10px;
            color: gold;
            text-shadow: 0 0 10px gold;
        }

        /* Balance Box */
        .balance-box {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 15px;
            max-width: 200px;
            margin: 10px auto;
            border: 2px solid gold;
            text-align: center;
        }

        .balance-box span {
            font-size: 1.5em;
            font-weight: bold;
            color: gold;
        }

        /* Game Status */
        .game-info {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            display: flex;
            justify-content: space-around;
            font-size: 0.9em;
        }

        .info-item {
            text-align: center;
        }

        .info-value {
            font-size: 1.2em;
            color: gold;
        }

        /* Card Selection Grid */
        #grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 3px;
            max-height: 150px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin: 10px 0;
        }

        .box {
            background: white;
            color: black;
            padding: 5px 0;
            border-radius: 3px;
            font-size: 0.7em;
            text-align: center;
            cursor: pointer;
        }

        .box.selected {
            background: #4CAF50;
            color: white;
        }

        /* Summary Bar */
        .summary-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            padding: 8px 15px;
            border-radius: 20px;
            margin: 10px 0;
            font-size: 0.9em;
        }

        /* Buttons */
        button {
            padding: 10px 20px;
            font-size: 1em;
            border: none;
            border-radius: 25px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
            margin: 5px;
            font-weight: bold;
        }

        .cancel-btn {
            background: #f44336;
        }

        .bingo-btn {
            background: #f44336;
            font-size: 1.5em;
            padding: 15px 40px;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ===== PROPER BINGO CARD STYLES ===== */
        .bingo-card {
            background: white;
            border-radius: 10px;
            padding: 10px;
            margin: 15px auto;
            max-width: 300px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        /* BINGO Header */
        .bingo-header {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 3px;
            margin-bottom: 5px;
        }

        .bingo-letter {
            background: gold;
            color: black;
            text-align: center;
            padding: 8px 0;
            font-weight: bold;
            font-size: 1.2em;
            border-radius: 5px;
        }

        /* 5x5 Grid */
        .gridCard {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 3px;
        }

        .cell {
            background: #f0f0f0;
            color: #333;
            padding: 10px 0;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.9em;
            text-align: center;
            border: 1px solid #ccc;
        }

        .cell.marked {
            background: #4CAF50;
            color: white;
        }

        .cell.free {
            background: gold;
            color: black;
            font-weight: bold;
        }

        /* Called Numbers */
        .called-numbers {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            min-height: 60px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .number-ball {
            display: inline-block;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: gold;
            color: black;
            text-align: center;
            line-height: 35px;
            font-weight: bold;
            font-size: 0.9em;
        }

        /* Countdown */
        .countdown-container {
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            border: 3px solid gold;
        }

        .countdown-timer {
            font-size: 4em;
            font-weight: bold;
            color: gold;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Winners */
        .winners-list {
            margin-top: 15px;
            padding: 10px;
            background: rgba(255,215,0,0.2);
            border-radius: 10px;
        }

        .winner-item {
            padding: 8px;
            margin: 5px 0;
            background: rgba(0,0,0,0.3);
            border-radius: 5px;
        }

        .info-text {
            text-align: center;
            font-size: 0.8em;
            color: rgba(255,255,255,0.7);
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎰 MK BINGO</h1>

        <!-- Balance -->
        <div class="balance-box">
            <span id="playerBalance">{{ balance|default('1000') }}</span> ETB
        </div>

        <!-- Game Status -->
        <div class="game-info">
            <div class="info-item">
                <div>Cards</div>
                <div class="info-value" id="totalCardsSold">0</div>
            </div>
            <div class="info-item">
                <div>Players</div>
                <div class="info-value" id="totalPlayers">0</div>
            </div>
            <div class="info-item">
                <div>Prize</div>
                <div class="info-value" id="prizePool">0</div>
            </div>
        </div>

        <!-- SELECTION PAGE -->
        <div id="selectPage">
            <h3 style="text-align: center;">🎫 Select Cards</h3>
            <div id="grid"></div>

            <div class="summary-bar">
                <span>Your: <span id="selectedCount">0</span></span>
                <span>Total: <span id="totalPrice">0</span> ETB</span>
            </div>

            <div style="text-align: center;">
                <button onclick="confirmCards()" id="confirmBtn">✅ BUY CARDS</button>
                <button class="cancel-btn" onclick="cancelSelection()">❌ CLEAR</button>
            </div>

            <div id="preview" style="display: flex; gap: 10px; overflow-x: auto; padding: 10px 0;"></div>
            
            <div class="info-text">
                * 10 cards total to start • 30s countdown
            </div>
        </div>

        <!-- COUNTDOWN PAGE -->
        <div id="countdownPage" style="display: none;">
            <div class="countdown-container">
                <div class="countdown-timer" id="countdownNumber">30</div>
                <div style="font-size: 1.2em;">Game Starting...</div>
                <div style="margin-top: 10px;">
                    <span id="finalCardsSold">10</span> cards • <span id="finalPlayers">0</span> players
                </div>
            </div>
        </div>

        <!-- GAME PAGE -->
        <div id="gamePage" style="display: none;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <h2 style="font-size: 1.2em;">🎯 Game</h2>
                <div class="timer" id="gameTimer">00:00</div>
            </div>

            <!-- Called Numbers -->
            <div class="called-numbers" id="numbersList"></div>

            <!-- BINGO Button -->
            <div style="text-align: center;">
                <button class="bingo-btn" onclick="callBingo()" id="bingoBtn" disabled>🔴 BINGO!</button>
            </div>

            <!-- Game Cards (will be populated with proper BINGO cards) -->
            <div id="gameCards"></div>

            <!-- Back Button -->
            <div style="text-align: center;">
                <button onclick="backToSelection()">🔙 BACK</button>
            </div>

            <!-- Winners -->
            <div id="winnersDisplay" class="winners-list" style="display: none;"></div>
        </div>
    </div>

    <script>
        // ==================== GLOBAL VARIABLES ====================
        let selectedCards = {};
        let playerBalance = {{ balance|default(1000) }};
        let userId = "{{ user_id|default('guest') }}";
        let currentGameCards = {};
        let gameSettings = {
            calledNumbers: [],
            winners: [],
            isGameActive: false,
            gameType: 'full house',
            prizeAmount: 2000,
            cardPrice: 10,
            minCardsToStart: 10
        };
        let sessionInfo = {
            totalCardsSold: 0,
            totalPlayers: 0,
            prizePool: 0
        };
        
        let gameTimer = null;
        let callInterval = null;
        let countdownInterval = null;
        let countdownValue = 30;
        let gameStarted = false;
        let bingoButtonEnabled = false;

        const API_URL = window.location.origin;

        // ==================== INIT ====================
        window.onload = function() {
            createNumberGrid();
            checkGameSession();
            setInterval(checkGameSession, 5000);
        };

        // ==================== CREATE CARD GRID ====================
        function createNumberGrid() {
            let grid = document.getElementById("grid");
            for (let i = 1; i <= 100; i++) {
                let box = document.createElement("div");
                box.className = "box";
                box.innerText = i;
                box.id = `card-${i}`;

                box.onclick = () => {
                    if (gameStarted) {
                        alert("Game in progress!");
                        return;
                    }
                    
                    if (selectedCards[i]) {
                        delete selectedCards[i];
                        box.classList.remove("selected");
                    } else {
                        selectedCards[i] = generateBingoCard(i);
                        box.classList.add("selected");
                    }

                    updatePreview();
                    updateSummary();
                };

                grid.appendChild(box);
            }
        }

        // ==================== GENERATE PROPER BINGO CARD ====================
        function generateBingoCard(cardNumber) {
            let card = new Array(25).fill(0);
            let seed = cardNumber || Math.floor(Math.random() * 1000);
            
            // B column (1-15)
            let bCol = [];
            while (bCol.length < 5) {
                let n = ((seed * 1 + bCol.length * 7) % 15) + 1;
                if (!bCol.includes(n)) bCol.push(n);
            }
            
            // I column (16-30)
            let iCol = [];
            while (iCol.length < 5) {
                let n = ((seed * 2 + iCol.length * 7) % 15) + 16;
                if (!iCol.includes(n)) iCol.push(n);
            }
            
            // N column (31-45)
            let nCol = [];
            while (nCol.length < 5) {
                let n = ((seed * 3 + nCol.length * 7) % 15) + 31;
                if (!nCol.includes(n)) nCol.push(n);
            }
            
            // G column (46-60)
            let gCol = [];
            while (gCol.length < 5) {
                let n = ((seed * 4 + gCol.length * 7) % 15) + 46;
                if (!gCol.includes(n)) gCol.push(n);
            }
            
            // O column (61-75)
            let oCol = [];
            while (oCol.length < 5) {
                let n = ((seed * 5 + oCol.length * 7) % 15) + 61;
                if (!oCol.includes(n)) oCol.push(n);
            }
            
            // Fill card row by row
            for (let row = 0; row < 5; row++) {
                card[row * 5 + 0] = bCol[row];
                card[row * 5 + 1] = iCol[row];
                card[row * 5 + 2] = nCol[row];
                card[row * 5 + 3] = gCol[row];
                card[row * 5 + 4] = oCol[row];
            }
            
            // Make center cell FREE (row 2, col 2 = index 12)
            card[12] = "FREE";
            
            return card;
        }

        // ==================== CREATE CARD ELEMENT ====================
        function createCardElement(card, cardNumber) {
            let div = document.createElement("div");
            div.className = "bingo-card";

            // BINGO Header
            let header = document.createElement("div");
            header.className = "bingo-header";
            ['B', 'I', 'N', 'G', 'O'].forEach(letter => {
                let l = document.createElement("div");
                l.className = "bingo-letter";
                l.innerText = letter;
                header.appendChild(l);
            });
            div.appendChild(header);

            // 5x5 Grid
            let grid = document.createElement("div");
            grid.className = "gridCard";

            card.forEach((num, index) => {
                let cell = document.createElement("div");
                cell.className = "cell";
                
                if (num === "FREE") {
                    cell.classList.add("free");
                } else if (gameSettings.calledNumbers.includes(num)) {
                    cell.classList.add("marked");
                }
                
                cell.innerText = num;
                grid.appendChild(cell);
            });

            div.appendChild(grid);
            
            // Card number
            let footer = document.createElement("div");
            footer.style.textAlign = 'center';
            footer.style.marginTop = '5px';
            footer.style.color = 'gold';
            footer.style.fontSize = '0.8em';
            footer.innerText = `Card #${cardNumber}`;
            div.appendChild(footer);
            
            return div;
        }

        // ==================== UPDATE PREVIEW ====================
        function updatePreview() {
            let preview = document.getElementById("preview");
            preview.innerHTML = "";
            
            let count = 0;
            for (let cardNum in selectedCards) {
                if (count++ >= 2) break;
                
                let card = selectedCards[cardNum];
                let div = document.createElement("div");
                div.style.background = 'rgba(0,0,0,0.5)';
                div.style.padding = '5px';
                div.style.borderRadius = '5px';
                div.style.minWidth = '120px';
                
                // Mini BINGO header
                let header = document.createElement("div");
                header.style.display = 'grid';
                header.style.gridTemplateColumns = 'repeat(5,1fr)';
                header.style.gap = '1px';
                header.style.marginBottom = '2px';
                ['B','I','N','G','O'].forEach(letter => {
                    let l = document.createElement("div");
                    l.style.background = 'gold';
                    l.style.color = 'black';
                    l.style.textAlign = 'center';
                    l.style.fontSize = '0.6em';
                    l.innerText = letter;
                    header.appendChild(l);
                });
                div.appendChild(header);
                
                // Mini grid
                let grid = document.createElement("div");
                grid.style.display = 'grid';
                grid.style.gridTemplateColumns = 'repeat(5,1fr)';
                grid.style.gap = '1px';
                
                card.forEach(num => {
                    let cell = document.createElement("div");
                    cell.style.background = num === "FREE" ? 'gold' : 'white';
                    cell.style.color = 'black';
                    cell.style.textAlign = 'center';
                    cell.style.fontSize = '0.55em';
                    cell.style.padding = '2px 0';
                    cell.innerText = num;
                    grid.appendChild(cell);
                });
                
                div.appendChild(grid);
                preview.appendChild(div);
            }
        }

        // ==================== UPDATE SUMMARY ====================
        function updateSummary() {
            let count = Object.keys(selectedCards).length;
            let total = count * gameSettings.cardPrice;
            document.getElementById("selectedCount").innerText = count;
            document.getElementById("totalPrice").innerText = total;
        }

        // ==================== CHECK GAME SESSION ====================
        async function checkGameSession() {
            try {
                let response = await fetch(`${API_URL}/api/game/session`);
                let data = await response.json();
                if (data.success) {
                    document.getElementById('totalCardsSold').innerText = data.total_cards_sold;
                    document.getElementById('totalPlayers').innerText = data.total_players;
                    document.getElementById('prizePool').innerText = data.prize_pool;
                }
            } catch (e) {
                console.log('Session check failed');
            }
        }

        // ==================== CONFIRM CARDS ====================
        async function confirmCards() {
            let count = Object.keys(selectedCards).length;
            let total = count * gameSettings.cardPrice;
            
            if (count === 0) {
                alert("Select cards!");
                return;
            }
            
            if (playerBalance < total) {
                alert(`Need ${total} ETB`);
                return;
            }
            
            try {
                let response = await fetch(`${API_URL}/api/game/purchase`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: userId,
                        cards_bought: count,
                        total_paid: total
                    })
                });
                
                let data = await response.json();
                
                if (data.success) {
                    playerBalance = data.new_balance;
                    document.getElementById("playerBalance").innerText = playerBalance;
                    
                    // Save cards for game
                    currentGameCards = { ...selectedCards };
                    
                    alert(`✅ ${count} cards bought!`);
                    
                    // Clear selection
                    selectedCards = {};
                    document.querySelectorAll(".box").forEach(b => b.classList.remove("selected"));
                    updatePreview();
                    updateSummary();
                    
                    // Show countdown if game is ready
                    if (data.game_ready) {
                        showCountdownPage();
                    }
                }
            } catch (error) {
                alert('Error processing purchase');
            }
        }

        // ==================== CANCEL SELECTION ====================
        function cancelSelection() {
            if (Object.keys(selectedCards).length > 0) {
                if (confirm("Clear all?")) {
                    selectedCards = {};
                    document.querySelectorAll(".box").forEach(b => b.classList.remove("selected"));
                    updatePreview();
                    updateSummary();
                }
            }
        }

        // ==================== SHOW COUNTDOWN ====================
        function showCountdownPage() {
            document.getElementById("selectPage").style.display = "none";
            document.getElementById("countdownPage").style.display = "block";
            
            document.getElementById('finalCardsSold').innerText = sessionInfo.totalCardsSold;
            document.getElementById('finalPlayers').innerText = sessionInfo.totalPlayers;
            
            startCountdown();
        }

        // ==================== START COUNTDOWN ====================
        function startCountdown() {
            countdownValue = 30;
            document.getElementById('countdownNumber').innerText = countdownValue;
            
            countdownInterval = setInterval(() => {
                countdownValue--;
                document.getElementById('countdownNumber').innerText = countdownValue;
                
                if (countdownValue <= 0) {
                    clearInterval(countdownInterval);
                    startGame();
                }
            }, 1000);
        }

        // ==================== START GAME ====================
        function startGame() {
            gameStarted = true;
            
            document.getElementById('countdownPage').style.display = 'none';
            document.getElementById('gamePage').style.display = 'block';
            
            gameSettings.isGameActive = true;
            
            startTimer();
            showGameCards();
            startNumberCalls();
        }

        // ==================== SHOW GAME CARDS ====================
        function showGameCards() {
            let container = document.getElementById("gameCards");
            container.innerHTML = "";
            
            for (let cardNum in currentGameCards) {
                let cardElement = createCardElement(currentGameCards[cardNum], cardNum);
                container.appendChild(cardElement);
            }
        }

        // ==================== BACK TO SELECTION ====================
        function backToSelection() {
            if (countdownInterval) clearInterval(countdownInterval);
            if (gameTimer) clearInterval(gameTimer);
            if (callInterval) clearInterval(callInterval);
            
            document.getElementById("selectPage").style.display = "block";
            document.getElementById("countdownPage").style.display = "none";
            document.getElementById("gamePage").style.display = "none";
            
            gameStarted = false;
            gameSettings.isGameActive = false;
            gameSettings.calledNumbers = [];
            gameSettings.winners = [];
        }

        // ==================== START NUMBER CALLS ====================
        function startNumberCalls() {
            gameSettings.calledNumbers = [];
            
            callInterval = setInterval(() => {
                if (!gameSettings.isGameActive) return;
                
                let num = Math.floor(Math.random() * 75) + 1;
                if (!gameSettings.calledNumbers.includes(num)) {
                    gameSettings.calledNumbers.push(num);
                    
                    // Add to display
                    let list = document.getElementById('numbersList');
                    let ball = document.createElement('span');
                    ball.className = 'number-ball';
                    ball.innerText = num;
                    list.appendChild(ball);
                    
                    // Update cards
                    showGameCards();
                    
                    // Enable Bingo button
                    document.getElementById('bingoBtn').disabled = false;
                    bingoButtonEnabled = true;
                }
            }, 3000);
        }

        // ==================== CALL BINGO ====================
        function callBingo() {
            if (!bingoButtonEnabled) {
                alert("Wait for numbers!");
                return;
            }
            
            // Simple win check (full house)
            let allMarked = true;
            for (let cardNum in currentGameCards) {
                let card = currentGameCards[cardNum];
                for (let i = 0; i < card.length; i++) {
                    if (card[i] !== "FREE" && !gameSettings.calledNumbers.includes(card[i])) {
                        allMarked = false;
                        break;
                    }
                }
            }
            
            if (allMarked) {
                alert("🎉 BINGO! YOU WIN! 🎉");
                document.getElementById('bingoBtn').disabled = true;
            } else {
                alert("❌ FALSE BINGO!");
            }
        }

        // ==================== TIMER ====================
        function startTimer() {
            let seconds = 0;
            gameTimer = setInterval(() => {
                seconds++;
                let mins = Math.floor(seconds / 60);
                let secs = seconds % 60;
                document.getElementById('gameTimer').innerText = 
                    `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            }, 1000);
        }
    </script>
</body>
</html>
