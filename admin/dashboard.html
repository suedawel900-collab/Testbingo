<!-- admin/dashboard.html -->
<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>አስተዳዳሪ ዳሽቦርድ</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <h1>👑 አስተዳዳሪ ዳሽቦርድ</h1>

        <div class="admin-section">
            <h2>⚙️ የጨዋታ ቅንብሮች</h2>
            
            <div class="settings-form">
                <div class="form-group">
                    <label>የአንድ ካርድ ዋጋ (ብር):</label>
                    <input type="number" id="cardPrice" min="1" value="10">
                </div>

                <div class="form-group">
                    <label>የጨዋታ አይነት:</label>
                    <select id="gameType">
                        <option value="fullhouse">Full House</option>
                        <option value="row">አንድ ረድፍ</option>
                        <option value="column">አንድ አምድ</option>
                        <option value="diagonal">ዲያግናል</option>
                        <option value="fourcorners">አራት ማዕዘን</option>
                        <option value="random">ራንደም</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>የሽልማት መጠን (ብር):</label>
                    <input type="number" id="prizeAmount" min="1" value="20">
                </div>

                <button onclick="saveSettings()" class="btn btn-success">
                    ቅንብሮችን አስቀምጥ
                </button>
            </div>
        </div>

        <div class="admin-section">
            <h2>🎮 ንቁ ጨዋታ</h2>
            
            <div class="active-players" id="activePlayers">
                <!-- ተጫዋቾች እዚህ ይታያሉ -->
            </div>

            <div class="game-controls">
                <button onclick="startNewGame()" class="btn btn-primary">
                    አዲስ ጨዋታ ጀምር
                </button>
                <button onclick="endGame()" class="btn btn-danger">
                    ጨዋታ አቁም
                </button>
            </div>
        </div>

        <div class="admin-section">
            <h2>📊 የቢንጎ ጥያቄዎች</h2>
            <div id="bingoClaims"></div>
        </div>
    </div>

    <script type="module">
        import { database, ref, set, onValue, update, get } from '../js/firebase-config.js';

        let currentGame = null;
        let timer = null;

        // የአሁኑን ቅንብሮች ማምጣት
        onValue(ref(database, 'gameSettings'), (snapshot) => {
            const settings = snapshot.val();
            if (settings) {
                document.getElementById('cardPrice').value = settings.cardPrice || 10;
                document.getElementById('gameType').value = settings.gameType || 'fullhouse';
                document.getElementById('prizeAmount').value = settings.prizeAmount || 20;
            }
        });

        // ንቁ ጨዋታን መከታተል
        onValue(ref(database, 'activeGame'), (snapshot) => {
            currentGame = snapshot.val();
            if (currentGame) {
                displayActivePlayers(currentGame.players);
                checkBingoClaims(currentGame);
            }
        });

        window.saveSettings = function() {
            const settings = {
                cardPrice: parseInt(document.getElementById('cardPrice').value),
                gameType: document.getElementById('gameType').value,
                prizeAmount: parseInt(document.getElementById('prizeAmount').value),
                lastUpdated: Date.now()
            };
            
            set(ref(database, 'gameSettings'), settings);
            alert('ቅንብሮች ተቀምጠዋል!');
        };

        window.startNewGame = function() {
            const gameSettings = {
                status: 'active',
                startTime: Date.now(),
                calledNumbers: [],
                players: {},
                winners: [],
                settings: {
                    cardPrice: parseInt(document.getElementById('cardPrice').value),
                    gameType: document.getElementById('gameType').value,
                    prizeAmount: parseInt(document.getElementById('prizeAmount').value)
                }
            };
            
            set(ref(database, 'activeGame'), gameSettings);
            
            // ከ15 ሰከንድ በኋላ ቅንብሮችን ማስተካከል
            timer = setTimeout(() => {
                update(ref(database), {
                    'gameSettings/cardPrice': 10,
                    'gameSettings/gameType': 'random'
                });
            }, 15000);
        };

        window.endGame = function() {
            if (timer) {
                clearTimeout(timer);
            }
            
            set(ref(database, 'activeGame'), null);
            alert('ጨዋታ ተቋርጧል');
        };

        function displayActivePlayers(players) {
            const container = document.getElementById('activePlayers');
            if (!players) {
                container.innerHTML = '<p>ምንም ተጫዋች የለም</p>';
                return;
            }
            
            let html = '<h3>ተጫዋቾች:</h3><ul>';
            Object.keys(players).forEach(playerId => {
                html += `<li>${playerId} - ${players[playerId].cards.length} ካርዶች</li>`;
            });
            html += '</ul>';
            
            container.innerHTML = html;
        }

        function checkBingoClaims(game) {
            if (!game.bingoClaims) return;
            
            const claims = Object.values(game.bingoClaims);
            const validWinners = [];
            
            claims.forEach(claim => {
                const playerCards = game.players[claim.playerId].cards;
                const card = playerCards[claim.cardIndex];
                const calledNumbers = game.calledNumbers || [];
                
                const result = verifyBingo(card, calledNumbers, game.settings.gameType);
                
                if (result.valid) {
                    validWinners.push({
                        ...claim,
                        ...result
                    });
                }
            });
            
            if (validWinners.length > 0) {
                processWinners(validWinners, game);
            }
            
            displayBingoClaims(claims, validWinners);
        }

        function verifyBingo(card, calledNumbers, gameType) {
            // እንደ ጨዋታ አይነት ማረጋገጥ
            if (gameType === 'fullhouse') {
                // ሁሉም ቁጥሮች መጠራት አለባቸው
                for (let row of card) {
                    for (let num of row) {
                        if (num !== 'FREE' && !calledNumbers.includes(num)) {
                            return { valid: false };
                        }
                    }
                }
                return { valid: true, type: 'fullhouse' };
            }
            
            if (gameType === 'row') {
                // ማንኛውም ረድፍ መሞላት አለበት
                for (let row of card) {
                    let rowComplete = true;
                    for (let num of row) {
                        if (num !== 'FREE' && !calledNumbers.includes(num)) {
                            rowComplete = false;
                            break;
                        }
                    }
                    if (rowComplete) {
                        return { valid: true, type: 'row' };
                    }
                }
            }
            
            if (gameType === 'random') {
                // የዘፈቀደ አሸናፊ ሁኔታ
                return Math.random() > 0.5 ? { valid: true, type: 'random' } : { valid: false };
            }
            
            return { valid: false };
        }

        function processWinners(winners, game) {
            const prizePerWinner = game.settings.prizeAmount / winners.length;
            
            const updates = {};
            updates['activeGame/winners'] = winners.map(w => ({
                ...w,
                prize: prizePerWinner
            }));
            
            // የአሸናፊዎችን ካርዶች ማሳየት
            updates['activeGame/winningCards'] = winners.map(w => ({
                playerId: w.playerId,
                card: game.players[w.playerId].cards[w.cardIndex]
            }));
            
            update(ref(database), updates);
        }

        function displayBingoClaims(claims, validWinners) {
            const container = document.getElementById('bingoClaims');
            let html = '<table><tr><th>ተጫዋች</th><th>ካርድ</th><th>ሁኔታ</th></tr>';
            
            claims.forEach(claim => {
                const isValid = validWinners.some(w => 
                    w.playerId === claim.playerId && w.cardIndex === claim.cardIndex
                );
                
                html += `
                    <tr>
                        <td>${claim.playerId}</td>
                        <td>ካርድ ${claim.cardIndex + 1}</td>
                        <td class="${isValid ? 'valid' : 'invalid'}">
                            ${isValid ? '✅ ትክክል' : '❌ ስህተት'}
                        </td>
                    </tr>
                `;
            });
            
            html += '</table>';
            container.innerHTML = html;
        }
    </script>
</body>
</html>
