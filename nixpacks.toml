[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmd = """
python -m venv --copies /opt/venv && \
. /opt/venv/bin/activate && \
pip install -r requirements.txt
"""

[phases.build]
cmd = "echo 'Build complete'"

[start]
cmd = "gunicorn app:application --bind 0.0.0.0:$PORT --log-level debug"