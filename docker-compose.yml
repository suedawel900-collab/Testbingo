version: '3.8'

services:
  bingo-bot:
    build: .
    container_name: mk-bingo-bot
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_IDS=${ADMIN_IDS}
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/bingo.db
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"